<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e7490">
<title>旅財布 — 旅の予算と記録</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="旅財布">
<style>
  /* ===== デザイントークン ===== */
  :root {
    --c-primary: #0e7490;        /* 深いティール(海) */
    --c-primary-dark: #155e75;
    --c-sky: #38bdf8;            /* 空色 */
    --c-accent: #f97316;         /* 夕日のオレンジ(アクセント) */
    --c-bg: #f6f8fa;
    --c-card: #ffffff;
    --c-text: #1e293b;
    --c-text-sub: #64748b;
    --c-line: #e2e8f0;
    --c-danger: #dc2626;
    --radius: 16px;
    --shadow: 0 2px 8px rgba(15, 23, 42, .08);
    --header-h: 56px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  [hidden] { display: none !important; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto,
                 "Hiragino Sans", "Noto Sans JP", "Yu Gothic UI", sans-serif;
    background: var(--c-bg);
    color: var(--c-text);
    line-height: 1.6;
    min-height: 100dvh;
  }

  /* ===== ヘッダー ===== */
  header {
    position: sticky; top: 0; z-index: 10;
    height: calc(var(--header-h) + env(safe-area-inset-top));
    padding-top: env(safe-area-inset-top);
    background: linear-gradient(135deg, var(--c-sky), var(--c-primary));
    color: #fff;
    display: flex; align-items: center;
    box-shadow: var(--shadow);
  }
  .header-inner {
    width: 100%; max-width: 640px; margin: 0 auto;
    padding: 0 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .app-title { font-size: 18px; font-weight: 700; letter-spacing: .02em; display: flex; align-items: center; gap: 8px; min-width: 0; }
  .app-title .plane { font-size: 20px; }
  .app-title #header-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .icon-btn {
    background: rgba(255,255,255,.15); border: none; color: #fff;
    width: 38px; height: 38px; border-radius: 50%;
    font-size: 19px; cursor: pointer; flex-shrink: 0;
    display: grid; place-items: center;
    transition: background .15s;
  }
  .icon-btn:active { background: rgba(255,255,255,.35); }

  /* ===== メイン ===== */
  main {
    max-width: 640px; margin: 0 auto;
    padding: 16px 16px calc(96px + env(safe-area-inset-bottom));
  }
  .view { animation: fadein .18s ease; }
  @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  h2.section-title {
    font-size: 14px; color: var(--c-text-sub); font-weight: 600;
    margin: 20px 0 8px; display: flex; align-items: center; gap: 6px;
  }
  .card {
    background: var(--c-card); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 20px;
  }
  .back-row { margin-bottom: 12px; }
  .btn-back {
    background: none; border: none; color: var(--c-primary);
    font-size: 14px; font-weight: 600; cursor: pointer; padding: 4px 0;
  }

  /* ===== ボタン ===== */
  .btn-primary {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    background: linear-gradient(135deg, var(--c-accent), #fb923c);
    color: #fff; border: none; border-radius: 999px;
    font-size: 15px; font-weight: 700; padding: 12px 28px;
    cursor: pointer; box-shadow: 0 4px 12px rgba(249, 115, 22, .35);
    transition: transform .1s;
  }
  .btn-primary:active { transform: scale(.97); }
  .btn-secondary {
    padding: 12px 20px; border-radius: 999px; border: 1.5px solid var(--c-line);
    background: #fff; color: var(--c-text); font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .btn-danger-ghost {
    width: 100%; margin-top: 14px; padding: 12px; border-radius: 999px;
    border: 1.5px solid #fecaca; background: #fff; color: var(--c-danger);
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .fab {
    position: fixed; right: 20px; bottom: calc(24px + env(safe-area-inset-bottom));
    width: 58px; height: 58px; border-radius: 50%;
    background: linear-gradient(135deg, var(--c-accent), #fb923c);
    color: #fff; font-size: 28px; line-height: 1; border: none; cursor: pointer;
    box-shadow: 0 6px 16px rgba(249, 115, 22, .4);
    display: grid; place-items: center; z-index: 5;
    transition: transform .1s;
  }
  .fab:active { transform: scale(.94); }

  /* ===== ホーム: 空状態 ===== */
  .empty-state { text-align: center; padding: 40px 20px; }
  .empty-state .art { font-size: 56px; line-height: 1; margin-bottom: 16px; }
  .empty-state p.lead { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .empty-state p.sub { font-size: 13px; color: var(--c-text-sub); margin-bottom: 24px; }

  /* ===== ホーム: 旅行カード ===== */
  .trip-card {
    display: block; width: 100%; text-align: left;
    background: var(--c-card); border: none; border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 14px 18px 14px 22px; margin-bottom: 12px;
    cursor: pointer; position: relative; overflow: hidden;
    font-family: inherit; color: var(--c-text); line-height: 1.6;
    transition: transform .1s;
  }
  .trip-card:active { transform: scale(.985); }
  .trip-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px;
    background: linear-gradient(180deg, var(--c-sky), var(--c-primary));
  }
  .trip-card.past::before { background: #cbd5e1; }
  .trip-card.ongoing::before { background: linear-gradient(180deg, var(--c-accent), #fbbf24); }
  .t-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .t-title { font-size: 16px; font-weight: 700; }
  .t-meta { font-size: 13px; color: var(--c-text-sub); margin-top: 2px; }
  .t-badge {
    font-size: 11px; font-weight: 700; border-radius: 999px; padding: 2px 10px; white-space: nowrap;
  }
  .t-badge.ongoing { background: #fff7ed; color: var(--c-accent); border: 1px solid #fed7aa; }
  .t-badge.countdown { background: #f0f9ff; color: var(--c-primary); border: 1px solid #bae6fd; }
  .t-badge.past { background: var(--c-bg); color: var(--c-text-sub); border: 1px solid var(--c-line); }

  /* ===== フォーム ===== */
  .form-card {
    background: var(--c-card); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 18px; margin-bottom: 4px;
  }
  label.field { display: block; margin-bottom: 14px; min-width: 0; }
  .f-label { font-size: 12px; font-weight: 600; color: var(--c-text-sub); display: block; margin-bottom: 4px; }
  input[type=text], input[type=date], input[type=number], input[type=datetime-local], select {
    width: 100%; padding: 10px 12px; border: 1px solid var(--c-line); border-radius: 10px;
    font-size: 15px; font-family: inherit; background: #fff; color: var(--c-text);
  }
  input:focus, select:focus { outline: 2px solid var(--c-sky); border-color: transparent; }
  .field-row { display: flex; gap: 10px; }
  .field-row > * { flex: 1; min-width: 0; }
  .hint { font-size: 12px; color: var(--c-text-sub); margin-bottom: 12px; }
  .sub-item {
    border: 1.5px dashed var(--c-line); border-radius: 12px;
    padding: 14px 12px 2px; margin-bottom: 10px; position: relative;
  }
  .btn-remove {
    position: absolute; top: 4px; right: 4px; z-index: 1;
    background: none; border: none; color: var(--c-text-sub);
    font-size: 15px; cursor: pointer; padding: 4px 8px;
  }
  .btn-add-row {
    width: 100%; padding: 10px; border-radius: 10px;
    border: 1.5px dashed var(--c-primary); background: rgba(14, 116, 144, .04);
    color: var(--c-primary); font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .form-actions { display: flex; gap: 10px; margin-top: 20px; }
  .form-actions .btn-secondary { flex: 1; }
  .form-actions .btn-primary { flex: 2; }

  /* ===== 旅行詳細 ===== */
  .detail-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .info-row { display: flex; gap: 10px; font-size: 14px; padding: 6px 0; }
  .info-row .i-icon { width: 22px; text-align: center; flex-shrink: 0; }
  .info-row .i-body { min-width: 0; }
  .info-sub { font-size: 12px; color: var(--c-text-sub); }
  .list-item { padding: 10px 0; border-bottom: 1px solid var(--c-line); font-size: 14px; }
  .list-item:last-child { border-bottom: none; padding-bottom: 0; }
  .list-item:first-child { padding-top: 0; }
  .chip-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    font-size: 13px; background: #f0f9ff; color: var(--c-primary-dark);
    border: 1px solid #bae6fd; border-radius: 999px; padding: 4px 12px;
  }
  .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .menu-tile {
    background: var(--c-card); border: none; border-radius: 14px;
    box-shadow: var(--shadow); padding: 16px 8px; text-align: center;
    cursor: pointer; font-family: inherit; color: var(--c-text);
    transition: transform .1s;
  }
  .menu-tile:active { transform: scale(.96); }
  .menu-tile .m-icon { font-size: 24px; display: block; margin-bottom: 4px; }
  .menu-tile .m-label { font-size: 13px; font-weight: 700; }
  .menu-tile .m-note { font-size: 10px; color: var(--c-text-sub); display: block; }

  /* ===== 設定 ===== */
  .settings-list { display: flex; flex-direction: column; overflow: hidden;
    background: var(--c-card); border-radius: var(--radius); box-shadow: var(--shadow); }
  .settings-item {
    display: flex; align-items: center; gap: 12px;
    padding: 15px 18px; border: none; border-bottom: 1px solid var(--c-line);
    background: none; width: 100%; text-align: left;
    font-size: 15px; font-family: inherit; color: var(--c-text); cursor: pointer;
  }
  .settings-item:last-child { border-bottom: none; }
  .settings-item .s-icon { font-size: 18px; width: 24px; text-align: center; }
  .settings-item .s-label { flex: 1; }
  .badge-soon {
    font-size: 11px; color: var(--c-text-sub);
    background: var(--c-bg); border: 1px solid var(--c-line);
    border-radius: 999px; padding: 2px 10px; white-space: nowrap;
  }
  .about { margin-top: 20px; text-align: center; font-size: 12px; color: var(--c-text-sub); }
  .about .storage { margin-top: 4px; }

  /* ===== 入力方式セグメント切替 ===== */
  .seg { display: flex; background: var(--c-bg); border-radius: 12px; padding: 4px; gap: 4px; margin-bottom: 14px; }
  .seg button {
    flex: 1; border: none; background: none; padding: 9px 4px; border-radius: 9px;
    font-size: 13px; font-weight: 600; color: var(--c-text-sub);
    cursor: pointer; font-family: inherit; transition: background .15s;
  }
  .seg button.active { background: #fff; color: var(--c-primary); box-shadow: var(--shadow); }

  /* ===== 合計カード ===== */
  .total-card {
    background: linear-gradient(135deg, var(--c-sky), var(--c-primary));
    color: #fff; border-radius: var(--radius); padding: 18px 20px;
    box-shadow: var(--shadow);
  }
  .total-card .tc-label { font-size: 12px; opacity: .9; }
  .total-card .tc-amount { font-size: 28px; font-weight: 800; line-height: 1.3; }
  .total-card .tc-sub { font-size: 12px; opacity: .9; }

  /* ===== 明細行 ===== */
  .row-btn {
    display: flex; width: 100%; justify-content: space-between; align-items: center; gap: 10px;
    padding: 11px 2px; border: none; border-bottom: 1px solid var(--c-line);
    background: none; font-family: inherit; font-size: 14px; color: var(--c-text);
    cursor: pointer; text-align: left; line-height: 1.5;
    user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
  }
  .row-btn:last-child { border-bottom: none; }
  .row-main { min-width: 0; flex: 1; }
  .row-title { font-weight: 600; display: block; }
  .row-sub { font-size: 12px; color: var(--c-text-sub); display: block; }
  .row-amount { text-align: right; white-space: nowrap; font-weight: 700; flex-shrink: 0; }
  .row-amount .jpy { display: block; font-size: 11px; color: var(--c-text-sub); font-weight: 500; }
  .cat-head { display: flex; justify-content: space-between; align-items: baseline; margin: 18px 2px 6px; }
  .cat-head .ch-name { font-size: 14px; font-weight: 700; }
  .cat-head .ch-sum { font-size: 13px; font-weight: 700; color: var(--c-primary-dark); }
  .calc-line { font-size: 15px; font-weight: 700; color: var(--c-primary-dark); text-align: right; min-height: 24px; }

  /* ===== 旅行情報からの候補チップ ===== */
  .suggest-label { font-size: 12px; font-weight: 600; color: var(--c-text-sub); margin-bottom: 6px; }
  .suggest-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .suggest-chip {
    border: 1.5px dashed var(--c-primary); background: rgba(14, 116, 144, .05);
    color: var(--c-primary-dark); border-radius: 12px; padding: 7px 12px;
    font-size: 12px; cursor: pointer; font-family: inherit; text-align: left; line-height: 1.5;
  }
  .suggest-chip:active { background: rgba(14, 116, 144, .12); }

  /* ===== クイック入力: カテゴリグリッド・チップ選択 ===== */
  .catsel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
  .catsel-btn {
    border: 1.5px solid var(--c-line); background: #fff; border-radius: 12px;
    padding: 10px 4px; text-align: center; cursor: pointer;
    font-family: inherit; color: var(--c-text); transition: border-color .1s, background .1s;
  }
  .catsel-btn .ci { font-size: 20px; display: block; line-height: 1.4; }
  .catsel-btn .cn { font-size: 11px; font-weight: 600; }
  .catsel-btn.selected { border-color: var(--c-primary); background: #f0f9ff; color: var(--c-primary-dark); }
  .curline { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .cur-chip {
    border: 1.5px solid var(--c-line); background: #fff; border-radius: 999px;
    padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: inherit; color: var(--c-text-sub); transition: border-color .1s, background .1s;
  }
  .cur-chip.selected { border-color: var(--c-primary); background: #f0f9ff; color: var(--c-primary-dark); }

  /* ===== 実績一覧 ===== */
  .total-card.spend { background: linear-gradient(135deg, #fb923c, var(--c-accent)); }
  .date-head { display: flex; justify-content: space-between; align-items: baseline; margin: 18px 2px 6px; }
  .date-head .dh-date { font-size: 14px; font-weight: 700; }
  .date-head .dh-sum { font-size: 13px; font-weight: 700; color: var(--c-primary-dark); }
  .row-icon { font-size: 18px; flex-shrink: 0; width: 26px; text-align: center; }
  .amount-minus { color: var(--c-danger); }
  .amount-plus { color: #059669; }

  /* ===== 比較ダッシュボード ===== */
  .ct-row { display: flex; justify-content: space-between; align-items: baseline; }
  .ct-row .ct-label { font-size: 12px; color: var(--c-text-sub); font-weight: 600; }
  .ct-pct { font-size: 26px; font-weight: 800; color: var(--c-primary-dark); }
  .ct-pct.over { color: var(--c-danger); }
  .ct-amounts { font-size: 22px; font-weight: 800; margin: 2px 0 10px; }
  .ct-slash { font-size: 13px; color: var(--c-text-sub); font-weight: 600; }
  .ct-remain { margin-top: 8px; font-size: 13px; font-weight: 700; color: var(--c-primary-dark); }
  .ct-remain.over { color: var(--c-danger); }
  .cmp-bar-wrap { background: #e8edf2; border-radius: 999px; height: 12px; overflow: hidden; }
  .cmp-bar-wrap.big { height: 16px; }
  .cmp-bar {
    height: 100%; border-radius: 999px; width: 0;
    transition: width .7s cubic-bezier(.22, 1, .36, 1);
    background: linear-gradient(90deg, var(--c-sky), var(--c-primary));
  }
  .cmp-bar.warn { background: linear-gradient(90deg, #fbbf24, #f97316); }
  .cmp-bar.over { background: linear-gradient(90deg, #f97316, #dc2626); }
  .cmp-bar.nobudget { background: #cbd5e1; }
  .cmp-cat { margin-bottom: 10px; padding: 14px 18px; }
  .cc-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .cc-name { font-size: 14px; font-weight: 700; }
  .cc-pct { font-size: 15px; font-weight: 800; color: var(--c-primary-dark); }
  .cc-pct.over { color: var(--c-danger); }
  .cc-nums { margin-top: 8px; font-size: 12px; color: var(--c-text-sub); }

  /* ===== カテゴリ管理 ===== */
  .catm-row { display: flex; align-items: center; gap: 8px; padding: 9px 0; border-bottom: 1px solid var(--c-line); }
  .catm-row:last-child { border-bottom: none; }
  .catm-icon { font-size: 18px; width: 26px; text-align: center; flex-shrink: 0; }
  .catm-name { flex: 1; font-size: 15px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mini-btn {
    border: 1px solid var(--c-line); background: #fff; border-radius: 8px;
    width: 34px; height: 34px; font-size: 14px; cursor: pointer;
    color: var(--c-text-sub); flex-shrink: 0; font-family: inherit;
  }
  .mini-btn:disabled { opacity: .3; }

  /* ===== メモリモード警告バナー ===== */
  #mem-banner {
    background: #fef3c7; color: #92400e;
    font-size: 12px; line-height: 1.5;
    padding: 8px 16px; text-align: center;
  }

  /* ===== トースト ===== */
  #toast {
    position: fixed; left: 50%; bottom: calc(28px + env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(20px);
    background: rgba(30, 41, 59, .92); color: #fff;
    font-size: 13px; padding: 10px 20px; border-radius: 999px;
    opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s;
    max-width: 86vw; text-align: center; z-index: 20;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="app-title"><span class="plane">✈️</span><span id="header-title">旅財布</span></div>
    <button class="icon-btn" id="btn-settings" aria-label="設定" title="設定">⚙️</button>
  </div>
</header>

<div id="mem-banner" hidden>⚠️ この環境ではデータを保存できません(一時プレビューモード)。スマホやブラウザで開くと保存されます。</div>

<main id="view" aria-live="polite"></main>

<div id="toast" role="status"></div>

<script>
'use strict';

/* =========================================================
 * IndexedDB 層
 * ストア: trips / budgetItems / expenses / categories /
 *         cashEntries / syncQueue / settings
 * =======================================================*/
const DB_NAME = 'tabi-budget';
const DB_VERSION = 1;
/* 各ストアの主キー(メモリモードでも使う) */
const STORE_KEYS = {
  trips: 'id', budgetItems: 'id', expenses: 'id',
  categories: 'id', cashEntries: 'id', syncQueue: 'id', settings: 'key',
};

const db = {
  _db: null,
  _mem: null,   /* IndexedDBが使えない環境(サンドボックス等)用の一時メモリストア */

  isMemoryMode() { return !!this._mem; },

  open() {
    if (this._db || this._mem) return Promise.resolve(this._db);
    return new Promise((resolve, reject) => {
      let req;
      try { req = indexedDB.open(DB_NAME, DB_VERSION); }
      catch (err) { reject(err); return; }
      req.onupgradeneeded = (e) => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains('trips')) {
          d.createObjectStore('trips', { keyPath: 'id' });
        }
        if (!d.objectStoreNames.contains('budgetItems')) {
          const s = d.createObjectStore('budgetItems', { keyPath: 'id' });
          s.createIndex('tripId', 'tripId');
        }
        if (!d.objectStoreNames.contains('expenses')) {
          const s = d.createObjectStore('expenses', { keyPath: 'id' });
          s.createIndex('tripId', 'tripId');
          s.createIndex('syncStatus', 'syncStatus');
        }
        if (!d.objectStoreNames.contains('categories')) {
          d.createObjectStore('categories', { keyPath: 'id' });
        }
        if (!d.objectStoreNames.contains('cashEntries')) {
          const s = d.createObjectStore('cashEntries', { keyPath: 'id' });
          s.createIndex('tripId', 'tripId');
        }
        if (!d.objectStoreNames.contains('syncQueue')) {
          d.createObjectStore('syncQueue', { keyPath: 'id' });
        }
        if (!d.objectStoreNames.contains('settings')) {
          d.createObjectStore('settings', { keyPath: 'key' });
        }
      };
      req.onsuccess = () => { this._db = req.result; resolve(this._db); };
      req.onerror = () => reject(req.error);
    }).catch((err) => {
      console.error('IndexedDBが使えないため、一時メモリモードで動作します:', err);
      this._mem = Object.fromEntries(Object.keys(STORE_KEYS).map((s) => [s, new Map()]));
      return null;
    });
  },

  _tx(store, mode, fn) {
    return new Promise((resolve, reject) => {
      const tx = this._db.transaction(store, mode);
      const result = fn(tx.objectStore(store));
      tx.oncomplete = () => resolve(result && result.result !== undefined ? result.result : result);
      tx.onerror = () => reject(tx.error);
    });
  },

  async get(store, key) {
    await this.open();
    if (this._mem) return this._mem[store].get(key);
    return this._tx(store, 'readonly', (s) => s.get(key));
  },
  async getAll(store) {
    await this.open();
    if (this._mem) return [...this._mem[store].values()];
    return this._tx(store, 'readonly', (s) => s.getAll());
  },
  async getByIndex(store, index, value) {
    await this.open();
    if (this._mem) return [...this._mem[store].values()].filter((v) => v[index] === value);
    return this._tx(store, 'readonly', (s) => s.index(index).getAll(value));
  },
  async put(store, value) {
    await this.open();
    if (this._mem) { this._mem[store].set(value[STORE_KEYS[store]], value); return; }
    return this._tx(store, 'readwrite', (s) => s.put(value));
  },
  async delete(store, key) {
    await this.open();
    if (this._mem) { this._mem[store].delete(key); return; }
    return this._tx(store, 'readwrite', (s) => s.delete(key));
  },
  async deleteByIndex(store, index, value) {
    await this.open();
    if (this._mem) {
      for (const [k, v] of [...this._mem[store]]) {
        if (v[index] === value) this._mem[store].delete(k);
      }
      return;
    }
    return this._tx(store, 'readwrite', (s) => {
      const req = s.index(index).getAllKeys(value);
      req.onsuccess = () => req.result.forEach((k) => s.delete(k));
      return req;
    });
  },
  async count(store) {
    await this.open();
    if (this._mem) return this._mem[store].size;
    return this._tx(store, 'readonly', (s) => s.count());
  },
};

/* =========================================================
 * 共通ヘルパー
 * =======================================================*/
const uid = (prefix) => prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) =>
  ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

const WEEKDAYS = ['日', '月', '火', '水', '木', '金', '土'];
function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function fmtDate(iso) {          // '2026-01-12' → '1/12(月)'
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return `${d.getMonth() + 1}/${d.getDate()}(${WEEKDAYS[d.getDay()]})`;
}
function fmtDateFull(iso) {      // '2026-01-12' → '2026/1/12(月)'
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}(${WEEKDAYS[d.getDay()]})`;
}
function fmtDT(dt) {             // '2026-01-12T11:25' → '1/12(月) 11:25'
  if (!dt) return '';
  const [date, time] = dt.split('T');
  return fmtDate(date) + (time ? ' ' + time : '');
}
function tripStatus(trip) {
  const t = todayISO();
  if (trip.endDate < t) return 'past';
  if (trip.startDate > t) return 'upcoming';
  return 'ongoing';
}
function nights(trip) {
  return Math.max(0, Math.round((new Date(trip.endDate) - new Date(trip.startDate)) / 864e5));
}
function daysUntil(iso) {
  return Math.round((new Date(iso + 'T00:00:00') - new Date(todayISO() + 'T00:00:00')) / 864e5);
}
/* 日本円換算レートを取得。purpose: 'budget'=予算用 / 'actual'=実績用
   実績レートが未設定の通貨は予算レートにフォールバックする */
function rateFor(trip, code, purpose) {
  const c = (trip.currencies || []).find((x) => x.code === code);
  if (!c) return 1;
  const budget = c.budgetRate ?? c.rateToJPY ?? 1;
  return purpose === 'actual' ? (c.actualRate ?? budget) : budget;
}
/* 金額表示(日本円は整数、外貨は小数2桁まで)。-0は0にする */
function fmtMoney(n, code = 'JPY') {
  let v = code === 'JPY' ? Math.round(n) : Math.round(n * 100) / 100;
  if (v === 0) v = 0; /* -0 対策 */
  return v.toLocaleString('ja-JP');
}
function symbolOf(trip, code) {
  const c = (trip.currencies || []).find((x) => x.code === code);
  return c ? (c.symbol || c.name) : (code === 'JPY' ? '¥' : code);
}
/* 通貨記号を数字の後ろに置く通貨(例: 人民元は「3,560元」であって「元3,560」ではない) */
const SUFFIX_CURRENCIES = new Set(['CNY']);
/* 金額+通貨記号を自然な語順で組み立てる(前置/後置を通貨ごとに切り替え) */
function fmtCurrencyAmount(trip, code, amount) {
  const sym = esc(symbolOf(trip, code));
  const num = fmtMoney(amount, code);
  return SUFFIX_CURRENCIES.has(code) ? `${num}${sym}` : `${sym}${num}`;
}

/* =========================================================
 * ルーター(ハッシュベース、パラメータ対応)
 * =======================================================*/
const routes = [
  { pattern: '/',              title: '旅財布',      render: renderHome },
  { pattern: '/settings',      title: '設定',        render: renderSettings },
  { pattern: '/categories',    title: 'カテゴリ管理', render: renderCategories },
  { pattern: '/backup',        title: 'バックアップ', render: renderBackup },
  { pattern: '/sync',          title: 'スプレッドシート同期', render: renderSyncSettings },
  { pattern: '/trip-form',     title: '旅行を登録',  render: renderTripForm },
  { pattern: '/trip-form/:id', title: '旅行を編集',  render: renderTripForm },
  { pattern: '/trip/:id',      title: '',            render: renderTripDetail },
  { pattern: '/trip/:id/budget',              title: '予算',      render: renderBudgetList },
  { pattern: '/trip/:id/budget-form',         title: '予算を追加', render: renderBudgetForm },
  { pattern: '/trip/:id/budget-form/:itemId', title: '予算を編集', render: renderBudgetForm },
  { pattern: '/trip/:id/expenses',             title: '費用',      render: renderExpenseList },
  { pattern: '/trip/:id/expense-form',         title: '費用を記録', render: renderExpenseForm },
  { pattern: '/trip/:id/expense-form/:itemId', title: '費用を編集', render: renderExpenseForm },
  { pattern: '/trip/:id/compare',              title: '比較',      render: renderCompare },
  { pattern: '/trip/:id/cash',                 title: '現金管理',  render: renderCashList },
  { pattern: '/trip/:id/cash-form',            title: '両替・入金を追加', render: renderCashForm },
  { pattern: '/trip/:id/cash-form/:entryId',   title: '両替・入金を編集', render: renderCashForm },
];

function currentPath() {
  const h = location.hash.replace(/^#/, '');
  return h === '' ? '/' : h;
}
function navigate(path) { location.hash = path; }

function matchRoute(path) {
  const sp = path.split('/').filter(Boolean);
  for (const r of routes) {
    const pp = r.pattern.split('/').filter(Boolean);
    if (pp.length !== sp.length) continue;
    const params = {};
    let ok = true;
    pp.forEach((seg, i) => {
      if (seg.startsWith(':')) params[seg.slice(1)] = decodeURIComponent(sp[i]);
      else if (seg !== sp[i]) ok = false;
    });
    if (ok) return { route: r, params };
  }
  return { route: routes[0], params: {} };
}

function setHeaderTitle(text) {
  document.getElementById('header-title').textContent = text;
}

let renderSeq = 0;
async function renderRoute() {
  const seq = ++renderSeq;
  const { route, params } = matchRoute(currentPath());
  if (!currentPath().endsWith('/expenses')) expenseReorder = false; /* 費用一覧を離れたら並び替えモード解除 */
  setHeaderTitle(route.title || '旅財布');
  const el = await route.render(params);
  if (seq !== renderSeq) return; /* 描画中に別画面へ遷移していたら破棄(二重表示防止) */
  el.classList.add('view');
  const view = document.getElementById('view');
  view.innerHTML = '';
  view.appendChild(el);
  window.scrollTo(0, 0);
}
window.addEventListener('hashchange', renderRoute);

async function renderHome() {
  const el = document.createElement('div');
  const trips = await db.getAll('trips');

  if (trips.length === 0) {
    el.innerHTML = `
      <div class="card empty-state">
        <div class="art">🧳</div>
        <p class="lead">まだ旅行がありません</p>
        <p class="sub">最初の旅行を登録して、予算づくりから始めましょう</p>
        <button class="btn-primary" id="btn-add-trip">＋ 旅行を登録する</button>
      </div>`;
    el.querySelector('#btn-add-trip').addEventListener('click', () => navigate('/trip-form'));
    return el;
  }

  const ongoing  = trips.filter((t) => tripStatus(t) === 'ongoing');
  const upcoming = trips.filter((t) => tripStatus(t) === 'upcoming').sort((a, b) => a.startDate.localeCompare(b.startDate));
  const past     = trips.filter((t) => tripStatus(t) === 'past').sort((a, b) => b.startDate.localeCompare(a.startDate));

  const cardHtml = (trip) => {
    const status = tripStatus(trip);
    const n = nights(trip);
    let badge = '';
    if (status === 'ongoing') {
      badge = `<span class="t-badge ongoing">🏖️ 旅行中</span>`;
    } else if (status === 'upcoming') {
      const d = daysUntil(trip.startDate);
      badge = `<span class="t-badge countdown">${d === 0 ? '今日出発!' : `あと${d}日`}</span>`;
    } else {
      badge = `<span class="t-badge past">おわった旅</span>`;
    }
    return `
      <button class="trip-card ${status}" data-id="${esc(trip.id)}">
        <div class="t-top"><span class="t-title">${esc(trip.title)}</span>${badge}</div>
        ${trip.destination ? `<div class="t-meta">📍 ${esc(trip.destination)}</div>` : ''}
        <div class="t-meta">🗓 ${fmtDateFull(trip.startDate)} 〜 ${fmtDateFull(trip.endDate)}(${n}泊${n + 1}日)</div>
      </button>`;
  };

  const section = (title, list) =>
    list.length ? `<h2 class="section-title">${title}</h2>` + list.map(cardHtml).join('') : '';

  el.innerHTML =
    section('🏖️ 旅行中', ongoing) +
    section('🛫 今後の旅行', upcoming) +
    section('📚 過去の旅行', past) +
    `<button class="fab" id="fab-add" aria-label="旅行を登録">＋</button>`;

  el.querySelectorAll('.trip-card').forEach((c) =>
    c.addEventListener('click', () => navigate('/trip/' + c.dataset.id)));
  el.querySelector('#fab-add').addEventListener('click', () => navigate('/trip-form'));
  return el;
}
