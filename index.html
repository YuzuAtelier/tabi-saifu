      arrAirport: r.querySelector('.fl-arr').value.trim(),
      arrDateTime: r.querySelector('.fl-arr-dt').value,
    })).filter((f) => f.flightNo || f.depAirport || f.arrAirport);

    const currencies = [{
      code: 'JPY', name: '日本円', symbol: '¥',
      budgetRate: 1, budgetRateDate: null, actualRate: 1, actualRateDate: null,
    }];
    for (const r of currenciesBox.querySelectorAll('.cur-row')) {
      const selVal = r.querySelector('.cu-select').value;
      const bRate = parseFloat(r.querySelector('.cu-brate').value);
      const aRateRaw = r.querySelector('.cu-arate').value.trim();
      const aRate = aRateRaw === '' ? null : parseFloat(aRateRaw);
      let code, name, symbol;
      if (selVal === '__custom') {
        name = r.querySelector('.cu-cname').value.trim();
        if (!name) { toast('通貨名を入力してください'); return; }
        code = name; symbol = '';
      } else {
        const p = CURRENCY_PRESETS.find((x) => x.code === selVal);
        ({ code, name, symbol } = p);
      }
      if (!(bRate > 0)) { toast(`${name}の予算レートを入力してください`); return; }
      if (aRate !== null && !(aRate > 0)) { toast(`${name}の実績レートが正しくありません`); return; }
      if (currencies.some((c) => c.code === code)) { toast(`通貨「${name}」が重複しています`); return; }
      currencies.push({
        code, name, symbol,
        budgetRate: bRate,
        budgetRateDate: r.querySelector('.cu-bdate').value || null,
        actualRate: aRate,
        actualRateDate: aRate === null ? null : (r.querySelector('.cu-adate').value || null),
      });
    }

    const now = new Date().toISOString();
    const record = {
      id: editing ? trip.id : uid('trip'),
      title,
      destination: el.querySelector('#f-dest').value.trim(),
      startDate, endDate,
      members: {
        adults: parseInt(el.querySelector('#f-adults').value, 10) || 0,
        children: parseInt(el.querySelector('#f-children').value, 10) || 0,
        infants: parseInt(el.querySelector('#f-infants').value, 10) || 0,
      },
      stays, flights, currencies,
      isImported: trip?.isImported || false,
      createdAt: trip?.createdAt || now,
      updatedAt: now,
    };
    await db.put('trips', record);
    toast(editing ? '旅行を更新しました ✅' : '旅行を登録しました 🎉');
    navigate('/trip/' + record.id);
  });

  /* --- 削除 --- */
  el.querySelector('#btn-delete')?.addEventListener('click', async () => {
    if (!confirm(`「${trip.title}」を削除しますか?\nこの旅行の予算・実績・現金の記録もすべて削除されます。`)) return;
    await db.deleteByIndex('budgetItems', 'tripId', trip.id);
    await db.deleteByIndex('expenses', 'tripId', trip.id);
    await db.deleteByIndex('cashEntries', 'tripId', trip.id);
    await db.delete('trips', trip.id);
    toast('旅行を削除しました');
    navigate('/');
  });

  return el;
}

/* =========================================================
 * 画面: 旅行詳細
 * =======================================================*/
async function renderTripDetail(params) {
  const trip = await db.get('trips', params.id);
  const el = document.createElement('div');
  if (!trip) {
    toast('旅行が見つかりません');
    navigate('/');
    return el;
  }
  setHeaderTitle(trip.title);

  const bItems = await db.getByIndex('budgetItems', 'tripId', trip.id);
  const budgetTotalJPY = bItems.reduce((s, it) => s + it.amount * rateFor(trip, it.currency, 'budget'), 0);
  const budgetNote = bItems.length ? `¥${fmtMoney(budgetTotalJPY)}` : '未設定';
  const eItems = await db.getByIndex('expenses', 'tripId', trip.id);
  const spentJPY = eItems.reduce((s, it) => s + (it.amountJPY ?? it.amount * rateFor(trip, it.currency, 'actual')), 0);
  const expenseNote = eItems.length ? `¥${fmtMoney(spentJPY)}` : '未記録';
  const compareNote = budgetTotalJPY > 0 ? `${Math.round(spentJPY / budgetTotalJPY * 100)}% 使用` : '—';

  /* 現金管理タイルは外貨を登録した旅行(=海外旅行)のみ表示 */
  const foreignCurs = (trip.currencies || []).filter((c) => c.code !== 'JPY');
  let cashTileHtml = '';
  if (foreignCurs.length) {
    const cEntries = await db.getByIndex('cashEntries', 'tripId', trip.id);
    const cashSpends = eItems.filter((e) => e.paymentMethod === 'cash' && e.currency !== 'JPY');
    const hasCashData = cEntries.length || cashSpends.length;
    const cashNote = hasCashData
      ? foreignCurs.map((c) => {
          const inSum = cEntries.filter((x) => x.currency === c.code).reduce((s, x) => s + x.amount, 0);
          const outSum = cashSpends.filter((x) => x.currency === c.code).reduce((s, x) => s + x.amount, 0);
          return `${c.symbol || c.code}${fmtMoney(inSum - outSum, c.code)}`;
        }).join('・')
      : '—';
    cashTileHtml = `<button class="menu-tile" id="tile-cash"><span class="m-icon">💵</span><span class="m-label">現金管理</span><span class="m-note">${cashNote}</span></button>`;
  }

  const status = tripStatus(trip);
  const n = nights(trip);
  let badge = '';
  if (status === 'ongoing') badge = `<span class="t-badge ongoing">🏖️ 旅行中</span>`;
  else if (status === 'upcoming') {
    const d = daysUntil(trip.startDate);
    badge = `<span class="t-badge countdown">${d === 0 ? '今日出発!' : `出発まであと${d}日`}</span>`;
  } else badge = `<span class="t-badge past">おわった旅</span>`;

  const m = trip.members || {};
  const memberText = [
    m.adults ? `大人${m.adults}` : '',
    m.children ? `こども${m.children}` : '',
    m.infants ? `幼児${m.infants}` : '',
  ].filter(Boolean).join('・') || '未設定';

  const staysHtml = (trip.stays || []).map((s) => {
    const range = (s.checkIn || s.checkOut)
      ? `<div class="info-sub">${fmtDate(s.checkIn)} 〜 ${fmtDate(s.checkOut)}</div>` : '';
    return `<div class="list-item">🏨 ${esc(s.name)}${range}</div>`;
  }).join('');

  const flightsHtml = (trip.flights || []).map((f) => `
    <div class="list-item">✈️ ${esc(f.flightNo)}${f.airline ? `(${esc(f.airline)})` : ''}
      <div class="info-sub">${esc(f.depAirport)} ${fmtDT(f.depDateTime)} → ${esc(f.arrAirport)} ${fmtDT(f.arrDateTime)}</div>
    </div>`).join('');

  const currencyRows = (trip.currencies || []).map((c) => {
    if (c.code === 'JPY') return `<div class="list-item">¥ 日本円(基準)</div>`;
    const sym = c.symbol ? `${esc(c.symbol)} ` : '';
    const bRate = c.budgetRate ?? c.rateToJPY;
    const bDate = c.budgetRateDate ? `(${fmtDateFull(c.budgetRateDate)}時点)` : '';
    const aText = c.actualRate
      ? `1単位 = ${c.actualRate}円${c.actualRateDate ? `(${fmtDateFull(c.actualRateDate)}時点)` : ''}`
      : '未設定 → 予算レートで換算';
    return `<div class="list-item">${sym}${esc(c.name)}
      <div class="info-sub">予算レート: 1単位 = ${bRate}円${bDate}</div>
      <div class="info-sub">費用レート: ${aText}</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="back-row"><button class="btn-back" id="btn-back">‹ 一覧に戻る</button></div>
    <div class="detail-head">${badge}</div>

    <h2 class="section-title">📌 この旅のメニュー</h2>
    <div class="menu-grid">
      <button class="menu-tile" id="tile-budget"><span class="m-icon">💰</span><span class="m-label">予算</span><span class="m-note">${budgetNote}</span></button>
      <button class="menu-tile" id="tile-expense"><span class="m-icon">📝</span><span class="m-label">費用の記録</span><span class="m-note">${expenseNote}</span></button>
      <button class="menu-tile" id="tile-compare"><span class="m-icon">📊</span><span class="m-label">予算と費用の比較</span><span class="m-note">${compareNote}</span></button>
      ${cashTileHtml}
    </div>

    <h2 class="section-title">ℹ️ 旅行情報</h2>
    <div class="card">
      ${trip.destination ? `<div class="info-row"><span class="i-icon">📍</span><div class="i-body">${esc(trip.destination)}</div></div>` : ''}
      <div class="info-row"><span class="i-icon">🗓</span><div class="i-body">${fmtDateFull(trip.startDate)} 〜 ${fmtDateFull(trip.endDate)}<span class="info-sub">(${n}泊${n + 1}日)</span></div></div>
      <div class="info-row"><span class="i-icon">👨‍👩‍👧</span><div class="i-body">${memberText}</div></div>
    </div>

    ${staysHtml ? `<h2 class="section-title">🏨 宿泊地</h2><div class="card">${staysHtml}</div>` : ''}
    ${flightsHtml ? `<h2 class="section-title">✈️ フライト/鉄道</h2><div class="card">${flightsHtml}</div>` : ''}

    <h2 class="section-title">💱 通貨とレート</h2>
    <div class="card">${currencyRows}</div>

    <div class="form-actions">
      <button class="btn-secondary" id="btn-edit" style="flex:1">✏️ 旅行情報を編集する</button>
    </div>`;

  el.querySelector('#btn-back').addEventListener('click', () => navigate('/'));
  el.querySelector('#btn-edit').addEventListener('click', () => navigate('/trip-form/' + trip.id));
  el.querySelector('#tile-budget').addEventListener('click', () => navigate(`/trip/${trip.id}/budget`));
  el.querySelector('#tile-expense').addEventListener('click', () => navigate(`/trip/${trip.id}/expenses`));
  el.querySelector('#tile-compare').addEventListener('click', () => navigate(`/trip/${trip.id}/compare`));
  el.querySelector('#tile-cash')?.addEventListener('click', () => navigate(`/trip/${trip.id}/cash`));
  return el;
}

/* =========================================================
 * 画面: 予算一覧
 * =======================================================*/
async function renderBudgetList(params) {
  const trip = await db.get('trips', params.id);
  const el = document.createElement('div');
  if (!trip) { toast('旅行が見つかりません'); navigate('/'); return el; }
  setHeaderTitle('予算 — ' + trip.title);

  const [items, cats] = await Promise.all([
    db.getByIndex('budgetItems', 'tripId', trip.id),
    db.getAll('categories'),
  ]);
  cats.sort((a, b) => a.order - b.order);
  const catMap = Object.fromEntries(cats.map((c) => [c.id, c]));
  const sortMode = (await db.get('settings', 'sort_budget'))?.value || 'category';

  const toJPY = (it) => it.amount * rateFor(trip, it.currency, 'budget');
  const totalJPY = items.reduce((sum, it) => sum + toJPY(it), 0);
  const hasForeign = items.some((it) => it.currency !== 'JPY');

  /* showCat=true: 行にカテゴリの絵文字と名前を出す(日付順表示用) */
  const rowHtml = (it, showCat) => {
    const cat = catMap[it.categoryId];
    const parts = [];
    if (!showCat && it.date) parts.push(fmtDate(it.date));
    if (showCat && cat) parts.push(cat.name);
    if (it.quantity > 1) parts.push(`${fmtCurrencyAmount(trip, it.currency, it.unitPrice)} × ${it.quantity}`);
    if (it.memo) parts.push(esc(it.memo));
    return `
        <button class="row-btn" data-id="${esc(it.id)}">
          ${showCat ? `<span class="row-icon">${cat ? esc(cat.icon) : '🏷️'}</span>` : ''}
          <span class="row-main">
            <span class="row-title">${esc(it.title) || (cat ? esc(cat.name) : '')}</span>
            ${parts.length ? `<span class="row-sub">${parts.join('・')}</span>` : ''}
          </span>
          <span class="row-amount">${fmtCurrencyAmount(trip, it.currency, it.amount)}
            ${it.currency === 'JPY' ? '' : `<span class="jpy">≈ ¥${fmtMoney(toJPY(it))}</span>`}
          </span>
        </button>`;
  };

  let sections;
  if (sortMode === 'date') {
    /* 日付順(古い日が上)。日付未定は最後にまとめる */
    const dated = items.filter((i) => i.date).sort((a, b) => a.date.localeCompare(b.date));
    const undated = items.filter((i) => !i.date);
    const dates = [...new Set(dated.map((i) => i.date))];
    sections = dates.map((d) => {
      const list = dated.filter((i) => i.date === d);
      const sub = list.reduce((s, it) => s + toJPY(it), 0);
      return `
      <div class="cat-head"><span class="ch-name">${fmtDateFull(d)}</span><span class="ch-sum">¥${fmtMoney(sub)}</span></div>
      <div class="card" style="padding:6px 16px">${list.map((it) => rowHtml(it, true)).join('')}</div>`;
    }).join('');
    if (undated.length) {
      const sub = undated.reduce((s, it) => s + toJPY(it), 0);
      sections += `
      <div class="cat-head"><span class="ch-name">📌 日付未定</span><span class="ch-sum">¥${fmtMoney(sub)}</span></div>
      <div class="card" style="padding:6px 16px">${undated.map((it) => rowHtml(it, true)).join('')}</div>`;
    }
  } else {
    /* カテゴリ別(カテゴリ管理の並び順) */
    sections = cats.map((cat) => {
      const list = items.filter((it) => it.categoryId === cat.id)
        .sort((a, b) => ((a.date || '9999') < (b.date || '9999') ? -1 : 1));
      if (!list.length) return '';
      const sub = list.reduce((s, it) => s + toJPY(it), 0);
      return `
      <div class="cat-head"><span class="ch-name">${esc(cat.icon)} ${esc(cat.name)}</span><span class="ch-sum">¥${fmtMoney(sub)}</span></div>
      <div class="card" style="padding:6px 16px">${list.map((it) => rowHtml(it, false)).join('')}</div>`;
    }).join('');
  }

  el.innerHTML = `
    <div class="back-row"><button class="btn-back" id="btn-back">‹ ${esc(trip.title)}に戻る</button></div>
    <div class="total-card">
      <div class="tc-label">この旅の予算合計</div>
      <div class="tc-amount">¥${fmtMoney(totalJPY)}</div>
      <div class="tc-sub">${items.length}件の予算${hasForeign ? '・外貨は予算レートで換算' : ''}</div>
    </div>
    ${items.length ? `
    <div class="seg" style="margin:14px 0 0">
      <button type="button" data-s="date" class="${sortMode === 'date' ? 'active' : ''}">日付順</button>
      <button type="button" data-s="category" class="${sortMode === 'category' ? 'active' : ''}">カテゴリ別</button>
    </div>` : ''}
    ${items.length ? sections : `
      <div class="card empty-state" style="margin-top:16px">
        <div class="art">💰</div>
        <p class="lead">まだ予算がありません</p>
        <p class="sub">日付ごとでも、単価×数量でも、一括でも。ひとつのフォームで登録できます</p>
        <button class="btn-primary" id="btn-first-add">＋ 予算を追加する</button>
      </div>`}
    <button class="fab" id="fab-add" aria-label="予算を追加">＋</button>`;

  el.querySelector('#btn-back').addEventListener('click', () => navigate('/trip/' + trip.id));
  const goAdd = () => navigate(`/trip/${trip.id}/budget-form`);
  el.querySelector('#fab-add').addEventListener('click', goAdd);
  el.querySelector('#btn-first-add')?.addEventListener('click', goAdd);
  el.querySelectorAll('.seg button').forEach((b) =>
    b.addEventListener('click', async () => {
      await db.put('settings', { key: 'sort_budget', value: b.dataset.s });
      await renderRoute();
    }));
  el.querySelectorAll('.row-btn').forEach((r) =>
    r.addEventListener('click', () => navigate(`/trip/${trip.id}/budget-form/${r.dataset.id}`)));
  return el;
}

/* =========================================================
 * 画面: 予算の追加・編集
 * =======================================================*/
async function renderBudgetForm(params) {
  const trip = await db.get('trips', params.id);
  const el = document.createElement('div');
  if (!trip) { toast('旅行が見つかりません'); navigate('/'); return el; }
  const editing = !!params.itemId;
  const item = editing ? await db.get('budgetItems', params.itemId) : null;
  if (editing && !item) { toast('予算が見つかりません'); navigate(`/trip/${trip.id}/budget`); return el; }

  const cats = (await db.getAll('categories')).sort((a, b) => a.order - b.order);
  const curs = trip.currencies || [];

  const catOptions = cats.map((c) =>
    `<option value="${esc(c.id)}" ${item?.categoryId === c.id ? 'selected' : ''}>${esc(c.icon)} ${esc(c.name)}</option>`).join('');
  const curOptions = curs.map((c) =>
    `<option value="${esc(c.code)}" ${(item?.currency || 'JPY') === c.code ? 'selected' : ''}>${esc(c.name)}</option>`).join('');

  el.innerHTML = `
    <div class="back-row"><button class="btn-back" id="btn-back">‹ 予算一覧に戻る</button></div>
    <form id="b-form" novalidate>
      <div class="form-card">
        <label class="field"><span class="f-label">カテゴリ *</span><select id="b-cat">${catOptions}</select></label>
        <div id="suggest"></div>
        <label class="field"><span class="f-label">予定日(決まっていなければ空欄でOK)</span>
          <input type="date" id="b-date" value="${esc(item?.date)}"
                 min="${esc(trip.startDate)}" max="${esc(trip.endDate)}"></label>
        <label class="field"><span class="f-label">内容</span>
          <input type="text" id="b-title" placeholder="例: 新宿-箱根湯本 / 昼食" value="${esc(item?.title)}"></label>
        ${curs.length > 1
          ? `<label class="field"><span class="f-label">通貨</span><select id="b-cur">${curOptions}</select></label>`
          : `<input type="hidden" id="b-cur" value="JPY">`}
        <div class="field-row">
          <label class="field"><span class="f-label">単価 *</span>
            <input type="number" id="b-price" step="any" min="0" inputmode="decimal"
                   placeholder="例: 1110" value="${item?.unitPrice ?? ''}"></label>
          <label class="field"><span class="f-label">数量(人数・泊数・日数)*</span>
            <input type="number" id="b-qty" step="any" min="0" inputmode="decimal" value="${item?.quantity ?? 1}"></label>
        </div>
        <label class="field"><span class="f-label">メモ</span>
          <input type="text" id="b-memo" placeholder="例: 小田急ロマンスカー" value="${esc(item?.memo)}"></label>
        <div class="calc-line" id="calc"></div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-secondary" id="btn-cancel">キャンセル</button>
        <button type="submit" class="btn-primary">${editing ? '更新する' : '保存する'}</button>
      </div>
      ${editing ? `<button type="button" class="btn-danger-ghost" id="btn-delete">🗑 この予算を削除する</button>` : ''}
    </form>`;

  const q = (s) => el.querySelector(s);
  const mem = trip.members || {};
  const personCount = Math.max(1, (mem.adults || 0) + (mem.children || 0));

  function currentAmount() {
    const price = parseFloat(q('#b-price').value) || 0;
    const qty = parseFloat(q('#b-qty').value) || 0;
    return price * qty;
  }
  function updateCalc() {
    const code = q('#b-cur').value || 'JPY';
    const amt = currentAmount();
    const sym = symbolOf(trip, code);
    const numStr = fmtMoney(amt, code);
    let text = `合計: ${SUFFIX_CURRENCIES.has(code) ? `${numStr}${sym}` : `${sym}${numStr}`}`;
    if (code !== 'JPY') text += `(≈ ¥${fmtMoney(amt * rateFor(trip, code, 'budget'))})`;
    q('#calc').textContent = text;
  }

  /* STEP2で登録した宿泊地・フライト/鉄道をカテゴリに応じて候補表示 */
  function suggestionsFor(catId) {
    if (catId === 'cat_hotel') {
      return (trip.stays || []).map((s) => {
        const n = (s.checkIn && s.checkOut)
          ? Math.max(1, Math.round((new Date(s.checkOut) - new Date(s.checkIn)) / 864e5))
          : null;
        return {
          label: `🏨 ${s.name}${n ? `(${fmtDate(s.checkIn)}〜${fmtDate(s.checkOut)}・${n}泊)` : ''}`,
          fill: { title: s.name, date: s.checkIn || '', quantity: n || 1, memo: n ? `${n}泊` : '' },
        };
      });
    }
    if (catId === 'cat_flight' || catId === 'cat_transport') {
      return (trip.flights || []).map((f) => {
        const route = [f.depAirport, f.arrAirport].filter(Boolean).join('-');
        const name = [f.flightNo, f.airline].filter(Boolean).join('/');
        if (!route && !name) return null;
        return {
          label: `✈️ ${route || name}${route && name ? `(${name})` : ''}`,
          fill: {
            title: route || name,
            date: f.depDateTime ? f.depDateTime.split('T')[0] : '',
            quantity: personCount,
            memo: name,
          },
        };
      }).filter(Boolean);
    }
    return [];
  }

  function updateSuggest() {
    const box = q('#suggest');
    const sug = suggestionsFor(q('#b-cat').value);
    if (!sug.length) { box.innerHTML = ''; return; }
    box.innerHTML = `<div class="suggest-label">旅行情報から選ぶ(タップで自動入力)</div>
      <div class="suggest-wrap">${sug.map((s, i) =>
        `<button type="button" class="suggest-chip" data-i="${i}">${esc(s.label)}</button>`).join('')}</div>`;
    box.querySelectorAll('.suggest-chip').forEach((chip) =>
      chip.addEventListener('click', () => {
        const f = sug[chip.dataset.i].fill;
        q('#b-title').value = f.title || '';
        if (f.date) q('#b-date').value = f.date;
        if (f.quantity) q('#b-qty').value = f.quantity;
        if (f.memo) q('#b-memo').value = f.memo;
        updateCalc();
        q('#b-price').focus();
      }));
  }

  q('#b-cat').addEventListener('change', updateSuggest);
  ['#b-price', '#b-qty', '#b-cur'].forEach((sel) => {
    const n = q(sel);
    n.addEventListener('input', updateCalc);
    n.addEventListener('change', updateCalc);
  });
  updateSuggest();
  updateCalc();

  const goBack = () => navigate(`/trip/${trip.id}/budget`);
  q('#btn-back').addEventListener('click', goBack);
  q('#btn-cancel').addEventListener('click', goBack);

  q('#b-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const price = parseFloat(q('#b-price').value);
    const qty = parseFloat(q('#b-qty').value);
    if (!(price > 0)) { toast('単価を入力してください'); return; }
    if (!(qty > 0)) { toast('数量を入力してください'); return; }

    const record = {
      id: editing ? item.id : uid('bud'),
      tripId: trip.id,
      categoryId: q('#b-cat').value,
      date: q('#b-date').value || null,
      title: q('#b-title').value.trim(),
      unitPrice: price,
      quantity: qty,
      amount: Math.round(price * qty * 100) / 100,
      currency: q('#b-cur').value || 'JPY',
      memo: q('#b-memo').value.trim(),
    };
    await db.put('budgetItems', record);
    toast(editing ? '予算を更新しました ✅' : '予算を追加しました 💰');
    goBack();
  });

  q('#btn-delete')?.addEventListener('click', async () => {
    if (!confirm('この予算を削除しますか?')) return;
    await db.delete('budgetItems', item.id);
    toast('予算を削除しました');
    goBack();
  });

  return el;
}

/* =========================================================
 * 画面: 費用一覧(家計簿)
 * =======================================================*/
let expenseReorder = false; /* 長押しで入る並び替えモード */

async function renderExpenseList(params) {
  const trip = await db.get('trips', params.id);
  const el = document.createElement('div');
  if (!trip) { toast('旅行が見つかりません'); navigate('/'); return el; }
  setHeaderTitle('費用 — ' + trip.title);

  const [items, cats] = await Promise.all([
    db.getByIndex('expenses', 'tripId', trip.id),
    db.getAll('categories'),
  ]);
  cats.sort((a, b) => a.order - b.order);
  const catMap = Object.fromEntries(cats.map((c) => [c.id, c]));
  const jpyOf = (it) => it.amountJPY ?? it.amount * rateFor(trip, it.currency, 'actual');
  const totalJPY = items.reduce((s, it) => s + jpyOf(it), 0);
  const hasForeign = items.some((it) => it.currency !== 'JPY');

  /* 並び順: 日付順(既定) or カテゴリ別。並び替えモード中は日付順に固定 */
  const savedSort = (await db.get('settings', 'sort_expense'))?.value || 'date';
  const sortMode = expenseReorder ? 'date' : savedSort;

  /* 同じ日付の中では手動の並び順(sortOrder)→記録順 */
  const sortGroup = (list) => list.sort((a, b) => {
    const ao = a.sortOrder, bo = b.sortOrder;
    if (ao != null && bo != null && ao !== bo) return ao - bo;
    if (ao != null && bo == null) return -1;
    if (ao == null && bo != null) return 1;
    return (a.createdAt || '').localeCompare(b.createdAt || '');
  });

  /* showCat=true: カテゴリの絵文字と名前を表示(日付順用)/ false: 日付を表示(カテゴリ別用) */
  const rowInner = (it, showCat) => {
    const cat = catMap[it.categoryId];
    const parts = [];
    if (!showCat && it.date) parts.push(fmtDate(it.date));
    if (showCat && cat) parts.push(cat.name);
    if (it.memo) parts.push(esc(it.memo));
    return `
          ${showCat ? `<span class="row-icon">${cat ? esc(cat.icon) : '🏷️'}</span>` : ''}
          <span class="row-main">
            <span class="row-title">${esc(it.title) || (cat ? esc(cat.name) : '')}</span>
            ${parts.length ? `<span class="row-sub">${parts.join('・')}</span>` : ''}
          </span>
          <span class="row-amount ${it.amount < 0 ? 'amount-minus' : ''}">${fmtCurrencyAmount(trip, it.currency, it.amount)}
            ${it.currency === 'JPY' ? '' : `<span class="jpy">≈ ¥${fmtMoney(jpyOf(it))}</span>`}
          </span>`;
  };

  let sections;
  if (sortMode === 'date') {
    const dates = [...new Set(items.map((i) => i.date))].sort(); /* 古い日が上 */
    sections = dates.map((d) => {
      const list = sortGroup(items.filter((it) => it.date === d));
      const sub = list.reduce((s, it) => s + jpyOf(it), 0);
      const rows = list.map((it, idx) => {
        const inner = rowInner(it, true);
        if (expenseReorder) {
          return `
        <div class="row-btn">
          ${inner}
          <span style="display:flex;gap:6px;flex-shrink:0">
            <button class="mini-btn r-up" data-id="${esc(it.id)}" ${idx === 0 ? 'disabled' : ''} aria-label="上へ">↑</button>
            <button class="mini-btn r-down" data-id="${esc(it.id)}" ${idx === list.length - 1 ? 'disabled' : ''} aria-label="下へ">↓</button>
          </span>
        </div>`;
        }
        return `<button class="row-btn" data-id="${esc(it.id)}">${inner}</button>`;
      }).join('');
      return `
      <div class="date-head"><span class="dh-date">${fmtDateFull(d)}</span><span class="dh-sum">¥${fmtMoney(sub)}</span></div>
      <div class="card" style="padding:6px 16px">${rows}</div>`;
    }).join('');
  } else {
    /* カテゴリ別(カテゴリ管理の並び順・小計付き) */
    sections = cats.map((cat) => {
      const list = items.filter((it) => it.categoryId === cat.id)
        .sort((a, b) => (a.date || '').localeCompare(b.date || '') ||
                        (a.createdAt || '').localeCompare(b.createdAt || ''));
      if (!list.length) return '';
      const sub = list.reduce((s, it) => s + jpyOf(it), 0);
      const rows = list.map((it) =>
        `<button class="row-btn" data-id="${esc(it.id)}">${rowInner(it, false)}</button>`).join('');
      return `
      <div class="cat-head"><span class="ch-name">${esc(cat.icon)} ${esc(cat.name)}</span><span class="ch-sum">¥${fmtMoney(sub)}</span></div>
      <div class="card" style="padding:6px 16px">${rows}</div>`;
    }).join('');
  }

  el.innerHTML = `
    <div class="back-row"><button class="btn-back" id="btn-back">‹ ${esc(trip.title)}に戻る</button></div>
    <div class="total-card spend">
      <div class="tc-label">これまでに使った金額</div>
      <div class="tc-amount">¥${fmtMoney(totalJPY)}</div>
      <div class="tc-sub">${items.length}件の記録${hasForeign ? '・外貨は費用レートで換算' : ''}</div>
    </div>
    ${expenseReorder ? `
      <div class="card" style="margin-top:12px;display:flex;align-items:center;justify-content:space-between;padding:10px 16px">
        <span style="font-size:13px;font-weight:700">↕️ 並び替えモード(同じ日の中で移動)</span>
        <button class="btn-primary" id="btn-reorder-done" style="padding:8px 22px;font-size:13px">完了</button>
      </div>`
      : (items.length ? `
    <div class="seg" style="margin:14px 0 0">
      <button type="button" data-s="date" class="${sortMode === 'date' ? 'active' : ''}">日付順</button>
      <button type="button" data-s="category" class="${sortMode === 'category' ? 'active' : ''}">カテゴリ別</button>
    </div>
    ${sortMode === 'date' ? `<p class="hint" style="margin:8px 2px -8px">明細を長押しすると並び替えができます</p>` : ''}` : '')}
    ${items.length ? sections : `
      <div class="card empty-state" style="margin-top:16px">
        <div class="art">📝</div>
        <p class="lead">まだ記録がありません</p>
        <p class="sub">使ったらその場でサッと記録。カテゴリと金額だけでOKです</p>
        <button class="btn-primary" id="btn-first-add">＋ 記録する</button>
      </div>`}
    ${expenseReorder ? '' : `<button class="fab" id="fab-add" aria-label="記録を追加">＋</button>`}`;

  el.querySelector('#btn-back').addEventListener('click', () => { expenseReorder = false; navigate('/trip/' + trip.id); });
  const goAdd = () => navigate(`/trip/${trip.id}/expense-form`);
  el.querySelector('#fab-add')?.addEventListener('click', goAdd);
  el.querySelector('#btn-first-add')?.addEventListener('click', goAdd);
  el.querySelectorAll('.seg button').forEach((b) =>
    b.addEventListener('click', async () => {
      await db.put('settings', { key: 'sort_expense', value: b.dataset.s });
      await renderRoute();
    }));

  if (expenseReorder) {
    el.querySelector('#btn-reorder-done').addEventListener('click', () => {
      expenseReorder = false;
      renderRoute();
    });
    async function moveItem(id, dir) {
      const it = items.find((x) => x.id === id);
      const group = sortGroup(items.filter((x) => x.date === it.date));
      const idx = group.indexOf(it);
      const j = idx + dir;
      if (j < 0 || j >= group.length) return;
      group.forEach((x, i) => { x.sortOrder = i * 10; });
      [group[idx].sortOrder, group[j].sortOrder] = [group[j].sortOrder, group[idx].sortOrder];
      for (const x of group) await db.put('expenses', x);
      await renderRoute();
    }
    el.querySelectorAll('.r-up').forEach((b) => b.addEventListener('click', () => moveItem(b.dataset.id, -1)));
    el.querySelectorAll('.r-down').forEach((b) => b.addEventListener('click', () => moveItem(b.dataset.id, 1)));
  } else {
    /* タップ=編集、長押し(0.5秒)=並び替えモード(日付順表示のときのみ) */
    el.querySelectorAll('.row-btn').forEach((r) => {
      let timer = null, fired = false;
      const start = () => {
        if (sortMode !== 'date') return;
        fired = false;
        timer = setTimeout(() => {
          fired = true;
          expenseReorder = true;
          renderRoute();
        }, 500);
      };
      const cancel = () => clearTimeout(timer);
      r.addEventListener('pointerdown', start);
      r.addEventListener('pointerup', cancel);
      r.addEventListener('pointerleave', cancel);
      r.addEventListener('pointercancel', cancel);
      r.addEventListener('click', () => {
        if (fired) return;
        navigate(`/trip/${trip.id}/expense-form/${r.dataset.id}`);
      });
    });
  }
  return el;
}

/* =========================================================
 * 画面: 実績のクイック入力・編集
 * =======================================================*/
async function renderExpenseForm(params) {
  const trip = await db.get('trips', params.id);
  const el = document.createElement('div');
  if (!trip) { toast('旅行が見つかりません'); navigate('/'); return el; }
  const editing = !!params.itemId;
  const item = editing ? await db.get('expenses', params.itemId) : null;
  if (editing && !item) { toast('記録が見つかりません'); navigate(`/trip/${trip.id}/expenses`); return el; }

  const cats = (await db.getAll('categories')).sort((a, b) => a.order - b.order);
  const curs = trip.currencies || [];
  const lastCur = (await db.get('settings', 'lastcur_' + trip.id))?.value;

  let selCat = item?.categoryId || null;
  let selCur = item?.currency || (curs.some((c) => c.code === lastCur) ? lastCur : 'JPY');
  let selPay = item?.paymentMethod || null;

  const t = todayISO();
  const defaultDate = item?.date || (t >= trip.startDate && t <= trip.endDate ? t : trip.startDate);

  el.innerHTML = `
    <div class="back-row"><button class="btn-back" id="btn-back">‹ 費用一覧に戻る</button></div>
    <form id="e-form" novalidate>
      <div class="form-card">
        <span class="f-label">カテゴリ *</span>
        <div class="catsel-grid" id="catsel">
          ${cats.map((c) => `
            <button type="button" class="catsel-btn" data-id="${esc(c.id)}">
              <span class="ci">${esc(c.icon)}</span><span class="cn">${esc(c.name)}</span>
            </button>`).join('')}
        </div>
        ${curs.length > 1 ? `
        <span class="f-label">通貨</span>
        <div class="curline" id="cursel">
          ${curs.map((c) => `
            <button type="button" class="cur-chip" data-code="${esc(c.code)}">${esc(c.symbol || c.name)} ${esc(c.name)}</button>`).join('')}
        </div>` : ''}
        <div class="field-row">
          <label class="field"><span class="f-label">金額 *</span>
            <input type="number" id="e-price" step="any" inputmode="decimal"
                   placeholder="例: 1580" value="${item?.unitPrice ?? ''}"></label>
          <label class="field" style="flex:0 0 32%"><span class="f-label">数量</span>
            <input type="number" id="e-qty" step="any" min="0" inputmode="decimal" value="${item?.quantity ?? 1}"></label>
        </div>
        <div class="calc-line" id="calc"></div>
        <label class="field"><span class="f-label">日付 *</span>
          <input type="date" id="e-date" value="${esc(defaultDate)}"></label>
        <label class="field"><span class="f-label">内容(店名・区間など)</span>
          <input type="text" id="e-title" placeholder="例: 山賊ホルモン / 箱根湯本-新宿" value="${esc(item?.title)}"></label>
        <span class="f-label">支払い方法(任意)</span>
        <div class="curline" id="paysel">
          <button type="button" class="cur-chip" data-pay="cash">💵 現金</button>
          <button type="button" class="cur-chip" data-pay="card">💳 カード</button>
        </div>
        <label class="field"><span class="f-label">メモ</span>
          <input type="text" id="e-memo" placeholder="例: エポスカード / クーポン利用" value="${esc(item?.memo)}"></label>
        <p class="hint">割引・クーポン・ポイント利用は、金額をマイナスで入力すると合計から差し引かれます。</p>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-secondary" id="btn-cancel">キャンセル</button>
        <button type="submit" class="btn-primary">${editing ? '更新する' : '記録する'}</button>
      </div>
      ${editing ? `<button type="button" class="btn-danger-ghost" id="btn-delete">🗑 この記録を削除する</button>` : ''}
    </form>`;

  const q = (s) => el.querySelector(s);

  function refreshSelections() {
    el.querySelectorAll('.catsel-btn').forEach((b) => b.classList.toggle('selected', b.dataset.id === selCat));
    el.querySelectorAll('#cursel .cur-chip').forEach((b) => b.classList.toggle('selected', b.dataset.code === selCur));
    el.querySelectorAll('#paysel .cur-chip').forEach((b) => b.classList.toggle('selected', b.dataset.pay === selPay));
  }
  function updateCalc() {
    const price = parseFloat(q('#e-price').value) || 0;
    const qty = parseFloat(q('#e-qty').value) || 0;
    const amt = price * qty;
    const sym = symbolOf(trip, selCur);
    const numStr = fmtMoney(amt, selCur);
    let text = `合計: ${SUFFIX_CURRENCIES.has(selCur) ? `${numStr}${sym}` : `${sym}${numStr}`}`;
    if (selCur !== 'JPY') text += `(≈ ¥${fmtMoney(amt * rateFor(trip, selCur, 'actual'))})`;
    q('#calc').textContent = text;
  }

  el.querySelectorAll('.catsel-btn').forEach((b) =>
    b.addEventListener('click', () => { selCat = b.dataset.id; refreshSelections(); }));
  el.querySelectorAll('#cursel .cur-chip').forEach((b) =>
    b.addEventListener('click', () => { selCur = b.dataset.code; refreshSelections(); updateCalc(); }));
  el.querySelectorAll('#paysel .cur-chip').forEach((b) =>
    b.addEventListener('click', () => {
      selPay = selPay === b.dataset.pay ? null : b.dataset.pay; /* もう一度タップで解除 */
      refreshSelections();
    }));
  ['#e-price', '#e-qty'].forEach((sel) => q(sel).addEventListener('input', updateCalc));
  refreshSelections();
  updateCalc();

  const goBack = () => navigate(`/trip/${trip.id}/expenses`);
  q('#btn-back').addEventListener('click', goBack);
  q('#btn-cancel').addEventListener('click', goBack);

  q('#e-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const price = parseFloat(q('#e-price').value);
    const qty = parseFloat(q('#e-qty').value) || 1;
    const date = q('#e-date').value;
    if (!selCat) { toast('カテゴリを選んでください'); return; }
    if (isNaN(price) || price === 0) { toast('金額を入力してください(割引はマイナスでOK)'); return; }
    if (!(qty > 0)) { toast('数量を入力してください'); return; }
    if (!date) { toast('日付を入力してください'); return; }

    const amount = Math.round(price * qty * 100) / 100;
    const record = {
      id: editing ? item.id : uid('exp'),
      tripId: trip.id,
      date,
      categoryId: selCat,
      title: q('#e-title').value.trim(),
      unitPrice: price,
      quantity: qty,
      amount,
      currency: selCur,
      amountJPY: Math.round(amount * rateFor(trip, selCur, 'actual') * 100) / 100,
      paymentMethod: selPay,
      memo: q('#e-memo').value.trim(),
      syncStatus: 'pending', /* 編集も再同期対象(シート側は同じIDの行を上書き) */
      createdAt: item?.createdAt || new Date().toISOString(),
    };
    await db.put('expenses', record);
    await db.put('settings', { key: 'lastcur_' + trip.id, value: selCur });
    toast(editing ? '記録を更新しました ✅' : '記録しました 📝');
    syncNow(false); /* オンライン&設定済みなら自動送信 */
    goBack();
  });

  q('#btn-delete')?.addEventListener('click', async () => {
    if (!confirm('この記録を削除しますか?')) return;
    await db.delete('expenses', item.id);
    toast('記録を削除しました');
    goBack();
  });

  return el;
}

/* =========================================================
 * 画面: 予算と費用の比較ダッシュボード
 * =======================================================*/
async function renderCompare(params) {
  const trip = await db.get('trips', params.id);
  const el = document.createElement('div');
  if (!trip) { toast('旅行が見つかりません'); navigate('/'); return el; }
  setHeaderTitle('比較 — ' + trip.title);

  const [bItems, eItems, cats] = await Promise.all([
    db.getByIndex('budgetItems', 'tripId', trip.id),
    db.getByIndex('expenses', 'tripId', trip.id),
    db.getAll('categories'),
  ]);
  cats.sort((a, b) => a.order - b.order);

  const bJPY = (it) => it.amount * rateFor(trip, it.currency, 'budget');
  const eJPY = (it) => it.amountJPY ?? it.amount * rateFor(trip, it.currency, 'actual');
  const budgetTotal = bItems.reduce((s, it) => s + bJPY(it), 0);
  const spentTotal = eItems.reduce((s, it) => s + eJPY(it), 0);

  if (!bItems.length && !eItems.length) {
    el.innerHTML = `
      <div class="back-row"><button class="btn-back" id="btn-back">‹ ${esc(trip.title)}に戻る</button></div>
      <div class="card empty-state">
        <div class="art">📊</div>
        <p class="lead">比較するデータがまだありません</p>
        <p class="sub">予算を立てて、費用を記録すると、ここで比較できます</p>
        <button class="btn-primary" id="btn-go-budget">💰 予算を立てる</button>
      </div>`;
    el.querySelector('#btn-back').addEventListener('click', () => navigate('/trip/' + trip.id));
    el.querySelector('#btn-go-budget').addEventListener('click', () => navigate(`/trip/${trip.id}/budget`));
    return el;
  }

  const pctOf = (spent, budget) => (budget > 0 ? (spent / budget) * 100 : null);
  const barClass = (p) => (p == null ? 'nobudget' : p > 100 ? 'over' : p > 80 ? 'warn' : '');
  const barWidth = (p) => (p == null ? 100 : Math.max(0, Math.min(100, p)));

  const totalPct = pctOf(spentTotal, budgetTotal);
  const remain = budgetTotal - spentTotal;
  let remainText, remainClass = '';
  if (budgetTotal <= 0) {
    remainText = '予算が未設定です(💰予算から登録できます)';
  } else if (remain >= 0) {
    remainText = `残り ¥${fmtMoney(remain)}`;
  } else {
    remainText = `⚠️ 予算を ¥${fmtMoney(-remain)} 超えています`;
    remainClass = 'over';
  }

  const catCards = cats.map((cat) => {
    const b = bItems.filter((it) => it.categoryId === cat.id).reduce((s, it) => s + bJPY(it), 0);
    const s = eItems.filter((it) => it.categoryId === cat.id).reduce((sum, it) => sum + eJPY(it), 0);
    if (!b && !s) return '';
    const p = pctOf(s, b);
    const over = p != null && p > 100;
    let note;
    if (!b) note = '予算未設定';
    else if (s <= b) note = `残り ¥${fmtMoney(b - s)}`;
    else note = `超過 ¥${fmtMoney(s - b)}`;
    return `
      <div class="card cmp-cat">
        <div class="cc-head">
          <span class="cc-name">${esc(cat.icon)} ${esc(cat.name)}</span>
          <span class="cc-pct ${over ? 'over' : ''}">${p == null ? '—' : Math.round(p) + '%'}</span>
        </div>
        <div class="cmp-bar-wrap"><div class="cmp-bar ${barClass(p)}" data-w="${barWidth(p)}"></div></div>
        <div class="cc-nums">費用 ¥${fmtMoney(s)} / 予算 ${b ? '¥' + fmtMoney(b) : '—'}・${note}</div>
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="back-row"><button class="btn-back" id="btn-back">‹ ${esc(trip.title)}に戻る</button></div>
    <div class="card">
      <div class="ct-row">
        <span class="ct-label">この旅ぜんぶの 費用 ÷ 予算</span>
        <span class="ct-pct ${totalPct != null && totalPct > 100 ? 'over' : ''}">${totalPct == null ? '—' : Math.round(totalPct) + '%'}</span>
      </div>
      <div class="ct-amounts">¥${fmtMoney(spentTotal)}<span class="ct-slash"> / 予算 ¥${fmtMoney(budgetTotal)}</span></div>
      <div class="cmp-bar-wrap big"><div class="cmp-bar ${barClass(totalPct)}" data-w="${barWidth(totalPct)}"></div></div>
      <div class="ct-remain ${remainClass}">${remainText}</div>
    </div>
    <h2 class="section-title">🏷️ カテゴリ別</h2>
    ${catCards || '<div class="card"><p style="font-size:13px;color:var(--c-text-sub)">カテゴリ別のデータがありません</p></div>'}`;

  el.querySelector('#btn-back').addEventListener('click', () => navigate('/trip/' + trip.id));

  /* バーを0→実際の幅へアニメーション */
  setTimeout(() => {
    el.querySelectorAll('.cmp-bar').forEach((b) => { b.style.width = b.dataset.w + '%'; });
  }, 60);

  return el;
}

/* =========================================================
 * 画面: 現金管理(海外旅行向け)
 * =======================================================*/
const CASH_TYPES = {
  exchange:   { icon: '💱', label: '両替' },
  withdrawal: { icon: '🏧', label: 'キャッシング' },
  adjust:     { icon: '🔧', label: '残高調整' },
};

async function renderCashList(params) {
  const trip = await db.get('trips', params.id);
  const el = document.createElement('div');
  if (!trip) { toast('旅行が見つかりません'); navigate('/'); return el; }
  setHeaderTitle('現金 — ' + trip.title);

  const foreign = (trip.currencies || []).filter((c) => c.code !== 'JPY');
  if (!foreign.length) {
    el.innerHTML = `
      <div class="back-row"><button class="btn-back" id="btn-back">‹ ${esc(trip.title)}に戻る</button></div>
      <div class="card empty-state">
        <div class="art">💵</div>
        <p class="lead">この旅行には外貨がありません</p>
        <p class="sub">現金管理は外貨を登録した旅行(海外旅行)で使えます。旅行情報の編集から通貨を追加してください</p>
      </div>`;
    el.querySelector('#btn-back').addEventListener('click', () => navigate('/trip/' + trip.id));
    return el;
  }

  const [entries, expenses, cats] = await Promise.all([
    db.getByIndex('cashEntries', 'tripId', trip.id),
    db.getByIndex('expenses', 'tripId', trip.id),
    db.getAll('categories'),
  ]);
  const catMap = Object.fromEntries(cats.map((c) => [c.id, c]));
  const cashSpends = expenses.filter((e) => e.paymentMethod === 'cash' && e.currency !== 'JPY');

  const sections = foreign.map((cur) => {
    const sym = cur.symbol || cur.code;
    /* 符号(+/−)は先頭に置き、金額+記号は通貨ごとの自然な語順で組み立てる */
    const fmtAmt = (n) => SUFFIX_CURRENCIES.has(cur.code)
      ? `${fmtMoney(n, cur.code)}${esc(sym)}` : `${esc(sym)}${fmtMoney(n, cur.code)}`;
    /* 入金(両替等)と現金支出をまとめ、通帳のように残高を計算する。
       並び順: 日付(古い順)→ 同日内は 両替・キャッシング → 支出(記録順) → 残高調整 */
    const rank = { in: 0, out: 1, adjust: 2 };
    const timeline = [
      ...entries.filter((e) => e.currency === cur.code)
        .map((e) => ({ kind: e.type === 'adjust' ? 'adjust' : 'in', e })),
      ...cashSpends.filter((x) => x.currency === cur.code)
        .map((x) => ({ kind: 'out', e: x })),
    ].sort((a, b) =>
      (a.e.date || '').localeCompare(b.e.date || '') ||
      (rank[a.kind] - rank[b.kind]) ||
      (a.e.createdAt || '').localeCompare(b.e.createdAt || ''));

    let bal = 0;
    const rowHtml = (t) => {
      const delta = t.kind === 'out' ? -t.e.amount : t.e.amount;
      bal += delta;
      const plus = delta >= 0;
      let title, sub, clickAttr;
      if (t.kind !== 'out') {
        const ct = CASH_TYPES[t.e.type] || CASH_TYPES.exchange;
        title = `${ct.icon} ${ct.label}${t.e.memo ? `(${esc(t.e.memo)})` : ''}`;
        const rate = (t.e.sourceJPY && t.e.amount > 0)
          ? `・実質 ${Math.round(t.e.sourceJPY / t.e.amount * 1000) / 1000}円/${esc(sym)}` : '';
        sub = `${t.e.sourceJPY ? `元手 ¥${fmtMoney(t.e.sourceJPY)}` : ''}${rate}`;
        clickAttr = `data-cash="${esc(t.e.id)}"`;
      } else {
        const cat = catMap[t.e.categoryId];
        title = esc(t.e.title) || (cat ? esc(cat.name) : '現金払い');
        sub = [cat ? esc(cat.name) : '', t.e.memo ? esc(t.e.memo) : ''].filter(Boolean).join('・');
        clickAttr = `data-exp="${esc(t.e.id)}"`;
      }
      return `
        <button class="row-btn" ${clickAttr}>
          <span class="row-main">
            <span class="row-title">${title}</span>
            ${sub ? `<span class="row-sub">${sub}</span>` : ''}
          </span>
          <span class="row-amount ${plus ? 'amount-plus' : 'amount-minus'}">${plus ? '+' : '−'}${fmtAmt(Math.abs(delta))}
            <span class="jpy">残高 ${fmtAmt(bal)}</span>
          </span>
        </button>`;
    };

    /* 日付ごとにカードでまとめる(見出し右はその日の終わり時点の残高) */
    const dates = [...new Set(timeline.map((t) => t.e.date))];
    const dayCards = dates.map((d) => {
      const rows = timeline.filter((t) => t.e.date === d).map(rowHtml).join('');
      return `
        <div class="date-head"><span class="dh-date">${fmtDateFull(d)}</span><span class="dh-sum">残高 ${fmtAmt(bal)}</span></div>
        <div class="card" style="padding:6px 16px">${rows}</div>`;
    }).join('');

    const balJPY = bal * rateFor(trip, cur.code, 'actual');
    return `
      <div class="card" style="margin-top:16px">
        <div class="ct-row"><span class="ct-label">${SUFFIX_CURRENCIES.has(cur.code) ? '' : `${esc(sym)} `}${esc(cur.name)}の財布</span></div>
        <div class="ct-amounts ${bal < 0 ? 'amount-minus' : ''}">${fmtAmt(bal)}<span class="ct-slash"> ≈ ¥${fmtMoney(balJPY)}</span></div>
        ${bal < 0 ? '<div class="ct-remain over">⚠️ 残高がマイナスです。両替・キャッシングの記録漏れがないか確認してください</div>' : ''}
      </div>
      ${dayCards || '<p class="hint" style="margin-top:8px">まだ入出金がありません。「＋」から両替やキャッシングを記録しましょう</p>'}`;
  }).join('');

  el.innerHTML = `
    <div class="back-row"><button class="btn-back" id="btn-back">‹ ${esc(trip.title)}に戻る</button></div>
    ${sections}
    <p class="hint" style="margin-top:14px">💡 現金で支払ったときは「費用の記録」で支払い方法を「💵現金」にすると、自動でここの残高から引かれます(二重入力は不要です)。</p>
    <button class="fab" id="fab-add" aria-label="両替・入金を追加">＋</button>`;

  el.querySelector('#btn-back').addEventListener('click', () => navigate('/trip/' + trip.id));
  el.querySelector('#fab-add').addEventListener('click', () => navigate(`/trip/${trip.id}/cash-form`));
  el.querySelectorAll('[data-cash]').forEach((r) =>
    r.addEventListener('click', () => navigate(`/trip/${trip.id}/cash-form/${r.dataset.cash}`)));
  el.querySelectorAll('[data-exp]').forEach((r) =>
    r.addEventListener('click', () => navigate(`/trip/${trip.id}/expense-form/${r.dataset.exp}`)));
  return el;
}

/* =========================================================
 * 画面: 両替・入金の追加・編集
 * =======================================================*/
async function renderCashForm(params) {
  const trip = await db.get('trips', params.id);
  const el = document.createElement('div');
  if (!trip) { toast('旅行が見つかりません'); navigate('/'); return el; }
  const editing = !!params.entryId;
  const entry = editing ? await db.get('cashEntries', params.entryId) : null;
  if (editing && !entry) { toast('記録が見つかりません'); navigate(`/trip/${trip.id}/cash`); return el; }

  const foreign = (trip.currencies || []).filter((c) => c.code !== 'JPY');
  if (!foreign.length) { toast('外貨が登録されていません'); navigate(`/trip/${trip.id}/cash`); return el; }

  let selType = entry?.type || 'exchange';
  let selCur = entry?.currency || foreign[0].code;
  const t = todayISO();
  const defaultDate = entry?.date || (t >= trip.startDate && t <= trip.endDate ? t : trip.startDate);

  el.innerHTML = `
    <div class="back-row"><button class="btn-back" id="btn-back">‹ 現金管理に戻る</button></div>
    <form id="c-form" novalidate>
      <div class="form-card">
        <span class="f-label">種類</span>
        <div class="seg" id="c-seg">
          <button type="button" data-t="exchange">💱 両替</button>
          <button type="button" data-t="withdrawal">🏧 キャッシング</button>
          <button type="button" data-t="adjust">🔧 残高調整</button>
        </div>
        ${foreign.length > 1 ? `
        <span class="f-label">通貨</span>
        <div class="curline" id="c-cursel">
          ${foreign.map((c) => `
            <button type="button" class="cur-chip" data-code="${esc(c.code)}">${esc(c.symbol || c.name)} ${esc(c.name)}</button>`).join('')}
        </div>` : ''}
        <label class="field"><span class="f-label">日付 *</span>
          <input type="date" id="c-date" value="${esc(defaultDate)}"></label>
        <div class="field-row">
          <label class="field"><span class="f-label" id="l-amount">受け取った金額(現地通貨)*</span>
            <input type="number" id="c-amount" step="any" inputmode="decimal"
                   placeholder="例: 17535" value="${entry?.amount ?? ''}"></label>
          <label class="field" id="w-source"><span class="f-label">元手の日本円</span>
            <input type="number" id="c-source" step="any" min="0" inputmode="decimal"
                   placeholder="例: 50000" value="${entry?.sourceJPY ?? ''}"></label>
        </div>
        <div class="calc-line" id="c-calc"></div>
        <label class="field"><span class="f-label">メモ(場所など)</span>
          <input type="text" id="c-memo" placeholder="例: マクタン空港 / エポスカード" value="${esc(entry?.memo)}"></label>
        <p class="hint" id="c-hint"></p>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-secondary" id="btn-cancel">キャンセル</button>
        <button type="submit" class="btn-primary">${editing ? '更新する' : '保存する'}</button>
      </div>
      ${editing ? `<button type="button" class="btn-danger-ghost" id="btn-delete">🗑 この記録を削除する</button>` : ''}
    </form>`;

  const q = (s) => el.querySelector(s);

  function refresh() {
    el.querySelectorAll('#c-seg button').forEach((b) => b.classList.toggle('active', b.dataset.t === selType));
    el.querySelectorAll('#c-cursel .cur-chip').forEach((b) => b.classList.toggle('selected', b.dataset.code === selCur));
    const adjust = selType === 'adjust';
    q('#w-source').hidden = adjust;
    q('#l-amount').textContent = adjust ? '調整額(±現地通貨)*' : '受け取った金額(現地通貨)*';
    q('#c-hint').textContent = adjust
      ? '実際の財布と残高がズレたときの補正用です。増やすときはプラス、減らすときはマイナスで入力します。'
      : '元手の日本円を入れると、手数料込みの実質レートを自動計算します(空欄でもOK)。';
    updateCalc();
  }
  function updateCalc() {
    const amount = parseFloat(q('#c-amount').value);
    const source = parseFloat(q('#c-source').value);
    const cur = foreign.find((c) => c.code === selCur);
    const sym = cur ? (cur.symbol || cur.code) : '';
    q('#c-calc').textContent = (selType !== 'adjust' && amount > 0 && source > 0)
      ? `実質レート: 1${sym} = ${Math.round(source / amount * 1000) / 1000}円`
      : '';
  }

  el.querySelectorAll('#c-seg button').forEach((b) =>
    b.addEventListener('click', () => { selType = b.dataset.t; refresh(); }));
  el.querySelectorAll('#c-cursel .cur-chip').forEach((b) =>
    b.addEventListener('click', () => { selCur = b.dataset.code; refresh(); }));
  ['#c-amount', '#c-source'].forEach((sel) => q(sel).addEventListener('input', updateCalc));
  refresh();

  const goBack = () => navigate(`/trip/${trip.id}/cash`);
  q('#btn-back').addEventListener('click', goBack);
  q('#btn-cancel').addEventListener('click', goBack);

  q('#c-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const amount = parseFloat(q('#c-amount').value);
    const sourceRaw = q('#c-source').value.trim();
    const source = sourceRaw === '' ? null : parseFloat(sourceRaw);
    const date = q('#c-date').value;
    if (!date) { toast('日付を入力してください'); return; }
    if (selType === 'adjust') {
      if (isNaN(amount) || amount === 0) { toast('調整額を入力してください(±で入力)'); return; }
    } else {
      if (!(amount > 0)) { toast('受け取った金額を入力してください'); return; }
      if (source !== null && !(source > 0)) { toast('元手の日本円が正しくありません'); return; }
    }
    const record = {
      id: editing ? entry.id : uid('cash'),
      tripId: trip.id,
      date,
      type: selType,
      currency: selCur,
      amount,
      sourceJPY: selType === 'adjust' ? null : source,
      memo: q('#c-memo').value.trim(),
      createdAt: entry?.createdAt || new Date().toISOString(),
    };
    await db.put('cashEntries', record);
    toast(editing ? '記録を更新しました ✅' : '記録しました 💵');
    goBack();
  });

  q('#btn-delete')?.addEventListener('click', async () => {
    if (!confirm('この記録を削除しますか?')) return;
    await db.delete('cashEntries', entry.id);
    toast('記録を削除しました');
    goBack();
  });

  return el;
}

/* =========================================================
 * 画面: カテゴリ管理
 * =======================================================*/
async function renderCategories() {
  const el = document.createElement('div');
  const cats = (await db.getAll('categories')).sort((a, b) => a.order - b.order);
  const [budgetItems, expenses] = await Promise.all([db.getAll('budgetItems'), db.getAll('expenses')]);
  const usage = (id) =>
    budgetItems.filter((b) => b.categoryId === id).length +
    expenses.filter((x) => x.categoryId === id).length;

  const rows = cats.map((c, i) => `
    <div class="catm-row" data-id="${esc(c.id)}">
      <span class="catm-icon">${esc(c.icon)}</span>
      <span class="catm-name">${esc(c.name)}</span>
      <button class="mini-btn up" ${i === 0 ? 'disabled' : ''} aria-label="上へ">↑</button>
      <button class="mini-btn down" ${i === cats.length - 1 ? 'disabled' : ''} aria-label="下へ">↓</button>
      <button class="mini-btn edit" aria-label="編集">✏️</button>
      <button class="mini-btn del" aria-label="削除">🗑</button>
    </div>`).join('');

  el.innerHTML = `
    <div class="back-row"><button class="btn-back" id="btn-back">‹ 設定に戻る</button></div>
    <h2 class="section-title">🏷️ カテゴリ一覧</h2>
    <div class="card">${rows}</div>
    <h2 class="section-title">＋ カテゴリを追加</h2>
    <div class="card">
      <div class="field-row">
        <label class="field" style="flex:0 0 90px"><span class="f-label">絵文字</span>
          <input type="text" id="new-icon" placeholder="🎿" maxlength="4"></label>
        <label class="field"><span class="f-label">カテゴリ名</span>
          <input type="text" id="new-name" placeholder="例: おみやげ"></label>
      </div>
      <button class="btn-add-row" id="btn-add-cat">＋ 追加する</button>
    </div>
    <p class="hint" style="margin-top:10px">並び順はそのまま予算・実績画面の表示順になります。使用中のカテゴリは削除できません。</p>`;

  el.querySelector('#btn-back').addEventListener('click', () => navigate('/settings'));

  async function move(id, dir) {
    const idx = cats.findIndex((c) => c.id === id);
    const other = cats[idx + dir];
    if (!other) return;
    const c = cats[idx];
    [c.order, other.order] = [other.order, c.order];
    await db.put('categories', c);
    await db.put('categories', other);
    await renderRoute();
  }

  async function del(id) {
    const cat = cats.find((c) => c.id === id);
    const n = usage(id);
    if (n > 0) { toast(`「${cat.name}」は${n}件の記録で使用中のため削除できません`); return; }
    if (!confirm(`カテゴリ「${cat.name}」を削除しますか?`)) return;
    await db.delete('categories', id);
    toast('カテゴリを削除しました');
    await renderRoute();
  }

  function editRow(row, id) {
    const cat = cats.find((c) => c.id === id);
    row.innerHTML = `
      <input type="text" class="e-icon" value="${esc(cat.icon)}" maxlength="4" style="width:58px;flex:0 0 auto">
      <input type="text" class="e-name" value="${esc(cat.name)}" style="flex:1;min-width:0">
      <button class="mini-btn ok" style="width:auto;padding:0 12px;color:var(--c-primary);font-weight:700">保存</button>
      <button class="mini-btn ng" style="width:auto;padding:0 12px">戻す</button>`;
    row.querySelector('.ok').addEventListener('click', async () => {
      const name = row.querySelector('.e-name').value.trim();
      if (!name) { toast('カテゴリ名を入力してください'); return; }
      cat.name = name;
      cat.icon = row.querySelector('.e-icon').value.trim() || '🏷️';
      await db.put('categories', cat);
      toast('カテゴリを更新しました ✅');
      await renderRoute();
    });
    row.querySelector('.ng').addEventListener('click', () => renderRoute());
  }

  el.querySelectorAll('.catm-row').forEach((row) => {
    const id = row.dataset.id;
    row.querySelector('.up').addEventListener('click', () => move(id, -1));
    row.querySelector('.down').addEventListener('click', () => move(id, 1));
    row.querySelector('.del').addEventListener('click', () => del(id));
    row.querySelector('.edit').addEventListener('click', () => editRow(row, id));
  });

  el.querySelector('#btn-add-cat').addEventListener('click', async () => {
    const name = el.querySelector('#new-name').value.trim();
    if (!name) { toast('カテゴリ名を入力してください'); return; }
    if (cats.some((c) => c.name === name)) { toast('同じ名前のカテゴリがあります'); return; }
    const icon = el.querySelector('#new-icon').value.trim() || '🏷️';
    const maxOrder = cats.reduce((m, c) => Math.max(m, c.order), 0);
    await db.put('categories', { id: uid('cat'), name, icon, order: maxOrder + 1, isDefault: false });
    toast('カテゴリを追加しました 🎉');
    await renderRoute();
  });

  return el;
}

/* =========================================================
 * スプレッドシート同期(Google Apps Script・一方向追記)
 * 費用記録のうち syncStatus が 'pending' のものを送信する。
 * URL・合言葉は設定画面から入力し、端末内(settings)にのみ保存。
 * =======================================================*/
let syncing = false;

async function getSyncConfig() {
  const url = (await db.get('settings', 'gasWebAppUrl'))?.value || '';
  const token = (await db.get('settings', 'gasToken'))?.value || '';
  return { url, token };
}

async function countPending() {
  return (await db.getByIndex('expenses', 'syncStatus', 'pending')).length;
}

async function syncNow(notify = false) {
  if (syncing) return false;
  const { url, token } = await getSyncConfig();
  if (!url || !token) {
    if (notify) toast('同期先が未設定です(設定 → スプレッドシート同期)');
    return false;
  }
  if (!navigator.onLine) {
    if (notify) toast('オフラインです。オンラインになったら自動で送信します 📮');
    return false;
  }
  const pending = await db.getByIndex('expenses', 'syncStatus', 'pending');
  if (!pending.length) {
    if (notify) toast('未同期のデータはありません ✅');
    return true;
  }
  syncing = true;
  try {
    const [trips, cats] = await Promise.all([db.getAll('trips'), db.getAll('categories')]);
    const tripMap = Object.fromEntries(trips.map((t) => [t.id, t.title]));
    const catMap = Object.fromEntries(cats.map((c) => [c.id, c.name]));
    const records = pending.map((e) => ({
      id: e.id,
      trip: tripMap[e.tripId] || e.tripId,
      date: e.date,
      category: catMap[e.categoryId] || e.categoryId,
      title: e.title || '',
      amount: e.amount,
      currency: e.currency,
      amountJPY: e.amountJPY,
      paymentMethod: e.paymentMethod === 'cash' ? '現金' : e.paymentMethod === 'card' ? 'カード' : '',
      memo: e.memo || '',
      createdAt: e.createdAt || '',
    }));
    /* Content-Typeを付けない=単純リクエストにしてGASのCORS制約を回避する */
    const res = await fetch(url, { method: 'POST', body: JSON.stringify({ token, records }) });
    const result = await res.json();
    if (!result.ok) throw new Error(result.error || 'sync rejected');
    const now = new Date().toISOString();
    for (const e of pending) {
      e.syncStatus = 'synced';
      e.syncedAt = now;
      await db.put('expenses', e);
    }
    await db.put('settings', { key: 'lastSyncAt', value: now });
    if (notify) toast(`${pending.length}件を同期しました 📤`);
    return true;
  } catch (err) {
    console.warn('同期に失敗:', err);
    if (notify) toast('同期に失敗しました。URL・合言葉・GASの公開設定を確認してください');
    return false;
  } finally {
    syncing = false;
  }
}
window.addEventListener('online', () => { syncNow(false); });

/* =========================================================
 * 画面: スプレッドシート同期の設定
 * =======================================================*/
async function renderSyncSettings() {
  const el = document.createElement('div');
  const { url, token } = await getSyncConfig();
  const pending = await countPending();
  const last = (await db.get('settings', 'lastSyncAt'))?.value;
  const lastText = last ? new Date(last).toLocaleString('ja-JP') : 'まだ同期していません';

  el.innerHTML = `
    <div class="back-row"><button class="btn-back" id="btn-back">‹ 設定に戻る</button></div>

    <h2 class="section-title">📤 同期の状態</h2>
    <div class="card">
      <div class="info-row"><span class="i-icon">🕒</span><div class="i-body">最終同期: ${esc(lastText)}</div></div>
      <div class="info-row"><span class="i-icon">📮</span><div class="i-body">未同期の費用記録: <b>${pending}件</b></div></div>
      <button class="btn-primary" id="btn-sync-now" style="width:100%;margin-top:10px">📤 今すぐ同期する</button>
    </div>

    <h2 class="section-title">⚙️ 接続設定</h2>
    <div class="card">
      <p class="hint">Google Apps Script(GAS)のWebアプリURLと合言葉を入力します。<b>この設定は端末の中にだけ保存され、コードには含まれません。</b>GAS側の準備手順は docs/SYNC_SETUP.md をご覧ください。</p>
      <label class="field"><span class="f-label">GAS WebアプリURL</span>
        <input type="text" id="s-url" placeholder="https://script.google.com/macros/s/…/exec" value="${esc(url)}"></label>
      <label class="field"><span class="f-label">合言葉(トークン)</span>
        <input type="text" id="s-token" placeholder="GAS側に設定した SYNC_TOKEN と同じ文字列" value="${esc(token)}"></label>
      <div class="form-actions" style="margin-top:4px">
        <button class="btn-secondary" id="btn-test" style="flex:1">接続テスト</button>
        <button class="btn-primary" id="btn-save" style="flex:1">保存する</button>
      </div>
    </div>

    <h2 class="section-title">📝 同期のしくみ</h2>
    <div class="card"><p class="hint" style="margin:0">
      ・費用を記録すると、オンラインなら自動でスプレッドシートに追記されます<br>
      ・オフラインのときは「未同期」として貯まり、オンライン復帰時に自動送信されます<br>
      ・記録を編集・再同期すると、シートの同じIDの行が上書きされます(二重になりません)<br>
      ・アプリ→シートの一方向です。シート側を書き換えてもアプリには影響しません
    </p></div>`;

  const q = (s) => el.querySelector(s);
  q('#btn-back').addEventListener('click', () => navigate('/settings'));

  async function saveConfig() {
    await db.put('settings', { key: 'gasWebAppUrl', value: q('#s-url').value.trim() });
    await db.put('settings', { key: 'gasToken', value: q('#s-token').value.trim() });
  }

  q('#btn-save').addEventListener('click', async () => {
    await saveConfig();
    toast('同期設定を保存しました ✅');
  });

  q('#btn-test').addEventListener('click', async () => {
    await saveConfig();
    const { url: u, token: t } = await getSyncConfig();
    if (!u || !t) { toast('URLと合言葉を入力してください'); return; }
    toast('接続を確認しています…');
    try {
      const res = await fetch(u, { method: 'POST', body: JSON.stringify({ token: t, records: [] }) });
      const j = await res.json();
      toast(j.ok ? '接続OK!同期できる状態です 🎉' : `接続できましたが拒否されました: ${j.error || '合言葉を確認してください'}`);
    } catch (err) {
      toast('接続に失敗しました。URLとGASの公開設定を確認してください');
    }
  });

  q('#btn-sync-now').addEventListener('click', async () => {
    await saveConfig();
    const ok = await syncNow(true);
    if (ok) await renderRoute(); /* 未同期件数を更新 */
  });

  return el;
}

/* =========================================================
 * 画面: バックアップ(JSONエクスポート/インポート)
 * =======================================================*/
const BACKUP_STORES = ['trips', 'budgetItems', 'expenses', 'categories', 'cashEntries', 'syncQueue', 'settings'];

async function renderBackup() {
  const el = document.createElement('div');
  const counts = {};
  for (const s of BACKUP_STORES) counts[s] = await db.count(s);

  el.innerHTML = `
    <div class="back-row"><button class="btn-back" id="btn-back">‹ 設定に戻る</button></div>
    <h2 class="section-title">📦 いまのデータ</h2>
    <div class="card" style="font-size:14px">
      旅行 ${counts.trips}件・予算 ${counts.budgetItems}件・費用 ${counts.expenses}件<br>
      現金 ${counts.cashEntries}件・カテゴリ ${counts.categories}件
    </div>
    <h2 class="section-title">💾 エクスポート(バックアップ作成)</h2>
    <div class="card">
      <p class="hint">全データを1つのJSONファイルとしてダウンロードします。機種変更や万一の故障に備えて、Google Drive等に保管しておくのがおすすめです。<br>
      ⚠️ スプレッドシート同期の設定(URL・合言葉)も含まれます。ファイルの共有にはご注意ください。</p>
      <button class="btn-primary" id="btn-export" style="width:100%">💾 JSONファイルをダウンロード</button>
    </div>
    <h2 class="section-title">📂 インポート(復元)</h2>
    <div class="card">
      <p class="hint">バックアップしたJSONファイルを取り込みます。同じIDのデータは上書き、無いものは追加されます(今あるデータが勝手に消えることはありません)。</p>
      <button class="btn-add-row" id="btn-import">📂 JSONファイルを選んで取り込む</button>
      <input type="file" id="import-file" accept=".json,application/json" hidden>
    </div>`;

  el.querySelector('#btn-back').addEventListener('click', () => navigate('/settings'));

  /* --- エクスポート --- */
  el.querySelector('#btn-export').addEventListener('click', async () => {
    const data = {};
    for (const s of BACKUP_STORES) data[s] = await db.getAll(s);
    const payload = { app: 'tabi-budget', version: 1, exportedAt: new Date().toISOString(), data };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `tabisaifu_backup_${todayISO()}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    toast('バックアップをダウンロードしました 💾');
  });

  /* --- インポート --- */
  const fileInput = el.querySelector('#import-file');
  el.querySelector('#btn-import').addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', async () => {
    const file = fileInput.files[0];
    if (!file) return;
    try {
      const payload = JSON.parse(await file.text());
      if (payload.app !== 'tabi-budget' || !payload.data || typeof payload.data !== 'object') {
        toast('旅財布のバックアップファイルではないようです');
        fileInput.value = '';
        return;
      }
      const d = payload.data;
      const n = (k) => (Array.isArray(d[k]) ? d[k].length : 0);
      const when = payload.exportedAt ? fmtDateFull(payload.exportedAt.slice(0, 10)) : '不明';
      const ok = confirm(
        `バックアップ(${when}作成)を取り込みます。\n\n` +
        `旅行 ${n('trips')}件 / 予算 ${n('budgetItems')}件 / 費用 ${n('expenses')}件\n` +
        `現金 ${n('cashEntries')}件 / カテゴリ ${n('categories')}件\n\n` +
        `同じIDのデータは上書きされます。よろしいですか?`);
      if (!ok) { fileInput.value = ''; return; }

      let total = 0;
      for (const s of BACKUP_STORES) {
        if (!Array.isArray(d[s])) continue;
        const key = STORE_KEYS[s];
        for (const rec of d[s]) {
          if (!rec || rec[key] == null) continue; /* 主キーの無いレコードはスキップ */
          await db.put(s, rec);
          total++;
        }
      }
      toast(`${total}件のデータを取り込みました 🎉`);
      await renderRoute();
    } catch (err) {
      console.error('インポート失敗:', err);
      toast('読み込みに失敗しました。ファイルの内容を確認してください');
    }
    fileInput.value = '';
  });

  return el;
}

/* =========================================================
 * 画面: 設定
 * =======================================================*/
async function renderSettings() {
  const el = document.createElement('div');
  el.innerHTML = `
    <div class="back-row"><button class="btn-back" id="btn-back">‹ ホームに戻る</button></div>
    <h2 class="section-title">データ</h2>
    <div class="settings-list">
      <button class="settings-item" id="si-categories"><span class="s-icon">🏷️</span><span class="s-label">カテゴリ管理</span><span class="badge-soon">›</span></button>
      <button class="settings-item" id="si-backup"><span class="s-icon">💾</span><span class="s-label">JSONエクスポート/インポート</span><span class="badge-soon">›</span></button>
      <button class="settings-item" id="si-sync"><span class="s-icon">📤</span><span class="s-label">スプレッドシート同期</span><span class="badge-soon" id="sync-badge">›</span></button>
    </div>
    <div class="about">
      <div>旅財布 v1.0.2</div>
      <div class="storage" id="storage-info">ストレージ使用量を確認中…</div>
      <div class="storage" id="sw-info"></div>
    </div>`;

  el.querySelector('#btn-back').addEventListener('click', () => navigate('/'));
  el.querySelector('#si-categories').addEventListener('click', () => navigate('/categories'));
  el.querySelector('#si-backup').addEventListener('click', () => navigate('/backup'));
  el.querySelector('#si-sync').addEventListener('click', () => navigate('/sync'));
  countPending().then((n) => {
    const badge = el.querySelector('#sync-badge');
    if (badge && n > 0) badge.textContent = `未同期 ${n}件`;
  });

  if (navigator.storage?.estimate) {
    navigator.storage.estimate().then(({ usage, quota }) => {
      const mb = (x) => (x / 1024 / 1024).toFixed(1);
      const info = el.querySelector('#storage-info');
      if (info) info.textContent = `ストレージ: ${mb(usage)} MB 使用 / 空き ${mb(quota)} MB`;
    });
  }
  const swInfo = el.querySelector('#sw-info');
  if ('serviceWorker' in navigator) {
    const reg = await navigator.serviceWorker.getRegistration();
    swInfo.textContent = reg ? 'オフライン対応: 有効 ✅' : 'オフライン対応: 準備中…';
  } else {
    swInfo.textContent = 'オフライン対応: この環境では利用できません';
  }
  return el;
}

/* =========================================================
 * 共通UI
 * =======================================================*/
let toastTimer = null;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

document.getElementById('btn-settings').addEventListener('click', () => navigate('/settings'));

/* =========================================================
 * 起動
 * =======================================================*/
async function boot() {
  await db.open();
  await seedCategoriesIfEmpty();
  if (db.isMemoryMode()) {
    document.getElementById('mem-banner').hidden = false;
  }
  await renderRoute();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch((err) => {
      console.warn('Service Worker登録に失敗(file://では動きません):', err);
    });
  }

  /* 起動から少し待って未同期分を自動送信 */
  setTimeout(() => syncNow(false), 2500);
}
boot();
</script>
